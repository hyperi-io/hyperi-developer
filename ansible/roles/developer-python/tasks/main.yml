---
# Developer-Python Role - Python extras beyond the base Astral suite.
#
# The Astral stack (uv + ruff + ty) installs with the developer BASE via the
# `astral` role (uv is general-purpose, so the whole suite is a base component),
# and `uv audit` / `uv check` are built into uv. This tier therefore adds only
# the opt-in legacy type checker for repos that still use it; `ty` is the HyperI
# default. The role is intentionally thin.

# mypy is OPT-IN: `ty` (from the base) is the default type checker. Install mypy
# only when explicitly requested (`--tags mypy`). uv is present (base astral),
# so a user-owned uv tool install keeps it refreshable by hyperi-update.
- name: Install mypy (opt-in legacy type checker; ty is the default)
  ansible.builtin.command:
    cmd: uv tool install mypy
  environment:
    PATH: "{{ user_home }}/.cargo/bin:{{ user_home }}/.local/bin:{{ ansible_facts['env'].PATH }}"
  become: false
  register: devpy_mypy_install
  changed_when: "'already installed' not in (devpy_mypy_install.stderr | default(''))"
  failed_when: false
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu', 'MacOSX']
  tags: ['mypy', 'never']

- name: Display the Python tier
  ansible.builtin.debug:
    msg: |
      Python tier ready. The Astral suite (uv, ruff, ty) comes from the base;
      `uv audit` and `uv check` are built in. This tier adds opt-in mypy
      (`--tags mypy`).
  tags: ['developer-python']
