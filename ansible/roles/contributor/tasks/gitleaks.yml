---
# Gitleaks - Secret detection tool (blocking gate for `hyperi-ci check`).
#
# Channel: distro package everywhere, so the host's own updates keep it current
# (Ubuntu universe apt / Fedora dnf / macOS brew). This drops the old hardcoded
# `linux_x64` GitHub-binary download, which 404'd on arm64 -- the distro package
# selects the right architecture itself.

# ============================================================================
# MACOS - Install via Homebrew
# ============================================================================

- name: Install Gitleaks (macOS)
  community.general.homebrew:
    name: gitleaks
    state: present
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

# ============================================================================
# LINUX - distro package (Ubuntu universe / Fedora dnf)
# ============================================================================

- name: Install Gitleaks (Linux)
  block:
    - name: Install Gitleaks (Fedora)
      ansible.builtin.dnf:
        name: gitleaks
        state: present
      when: ansible_facts['distribution'] == 'Fedora'

    - name: Install Gitleaks (Ubuntu)
      ansible.builtin.apt:
        name: gitleaks
        state: present
        update_cache: true
      when: ansible_facts['distribution'] == 'Ubuntu'

  rescue:
    - name: Record that Gitleaks did not install (Linux)
      # noqa: var-naming[no-role-prefix] -- deploy_warnings is deliberately NOT
      # role-prefixed: it is the shared accumulator that playbooks/main.yml
      # post_tasks reports from. A per-role name would give every role its own
      # list and the summary would report almost nothing.
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['gitleaks: ' ~ (ansible_failed_result.msg | default('install failed'))] }}

  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
