---
# Verification — SOE role tools.
#
# Only what soe itself installs. gitleaks and act moved to `contributor` along
# with the tasks that install them -- verifying them from here would pass by
# accident (soe depends on contributor, so they happen to be present) and would
# keep passing if contributor stopped installing them. A verify that cannot
# fail for the right reason is not a verify.

- name: Verify OpenVPN 3 (Linux)
  ansible.builtin.command: openvpn3 version
  register: verify_openvpn
  changed_when: false
  failed_when: verify_openvpn.rc != 0
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - not (openvpn3_install_failed | default(false))

- name: Verify OpenVPN 3 (macOS)
  ansible.builtin.command: openvpn --version
  environment: "{{ homebrew_env }}"
  register: verify_openvpn
  changed_when: false
  failed_when: verify_openvpn.rc != 0
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Verify Claude Code CLI (Linux)
  ansible.builtin.command: "{{ user_home }}/.local/bin/claude --version"
  register: verify_claude
  changed_when: false
  failed_when: verify_claude.rc != 0
  become: false
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Verify Claude Code CLI (macOS)
  ansible.builtin.command: claude --version
  environment: "{{ homebrew_env }}"
  register: verify_claude
  changed_when: false
  failed_when: verify_claude.rc != 0
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Display SOE tools verification
  ansible.builtin.debug:
    msg: |
      ✅ SOE Tools Verified:
      - OpenVPN: {{ verify_openvpn.stdout | default('skipped (install failed - manual install required)') }}
      - Claude Code CLI: {{ verify_claude.stdout | default('installed') }}
