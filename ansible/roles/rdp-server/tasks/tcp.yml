---
# TCP optimizations for RDP (low-latency, mobile-friendly).
# VM guests only - these are VM-oriented network tunings and must NOT be
# applied to physical machines (same gating idiom as the vm_optimizer role).

- name: Configure TCP BBR congestion control for RDP (VM guests only)
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-rdp-optimization.conf
    content: |
      # RDP TCP Optimizations

      # BBR congestion control for mobile/high-latency
      net.core.default_qdisc = fq
      net.ipv4.tcp_congestion_control = bbr

      # Increase network buffers for RDP
      net.core.rmem_max = 16777216
      net.core.wmem_max = 16777216
      net.ipv4.tcp_rmem = 4096 87380 16777216
      net.ipv4.tcp_wmem = 4096 65536 16777216
      net.core.netdev_max_backlog = 5000
    mode: '0644'
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - ansible_virtualization_role == 'guest'

# Physical machines: remove the drop-in if a previous run (or older role) left it.
- name: Remove RDP TCP sysctls on physical machines
  ansible.builtin.file:
    path: /etc/sysctl.d/99-rdp-optimization.conf
    state: absent
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - ansible_virtualization_role != 'guest'
