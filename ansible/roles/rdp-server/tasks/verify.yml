---
# Verification - RDP optimizer (functional checks)

- name: Skip if no GNOME
  ansible.builtin.meta: end_play
  when: not has_gnome

# Check gnome-remote-desktop service enabled (will be active after reboot)
- name: Verify gnome-remote-desktop service enabled
  ansible.builtin.systemd:
    name: gnome-remote-desktop.service
  register: verify_grd_service
  failed_when: verify_grd_service.status.UnitFileState != 'enabled'

# Functional check: confirm grdctl actually enabled the RDP backend.
# The config tasks in service.yml use failed_when:false, so without this an
# upstream grdctl syntax change or silent error would report success while
# configuring nothing. This assertion is the authoritative gate.
- name: Query RDP runtime configuration via grdctl
  ansible.builtin.command:
    cmd: grdctl --system status
  register: verify_grd_status
  changed_when: false
  failed_when: false

- name: Assert RDP backend is enabled
  ansible.builtin.assert:
    that:
      - "'Status: enabled' in verify_grd_status.stdout"
    fail_msg: >-
      grdctl reports the RDP backend is NOT enabled. grdctl --system status output:
      {{ verify_grd_status.stdout | default('(no output)') }}
    success_msg: "RDP backend enabled via grdctl"

# Informative (non-fatal): the system daemon binds 3389 once active. A reboot
# may be required before the login greeter brings it up on some setups.
- name: Check whether RDP port 3389 is listening
  ansible.builtin.command:
    cmd: ss -ltnH sport = :3389
  register: verify_rdp_port
  changed_when: false
  failed_when: false

# Check certificates exist
- name: Verify RDP TLS certificate exists
  ansible.builtin.stat:
    path: /var/lib/gnome-remote-desktop/rdp-tls.crt
  register: verify_rdp_cert
  failed_when: not verify_rdp_cert.stat.exists

- name: Verify RDP TLS key exists
  ansible.builtin.stat:
    path: /var/lib/gnome-remote-desktop/rdp-tls.key
  register: verify_rdp_key
  failed_when: not verify_rdp_key.stat.exists

# Networking sysctls: expected ONLY on VM guests; physical hosts must not have them.
- name: Stat RDP TCP sysctl drop-in
  ansible.builtin.stat:
    path: /etc/sysctl.d/99-rdp-optimization.conf
  register: verify_rdp_tcp_conf

- name: Stat RDP MTU sysctl drop-in
  ansible.builtin.stat:
    path: /etc/sysctl.d/99-rdp-mtu.conf
  register: verify_rdp_mtu_conf

- name: Assert RDP networking sysctls match host class (guest only)
  ansible.builtin.assert:
    that:
      - (ansible_virtualization_role == 'guest') == (verify_rdp_tcp_conf.stat.exists | default(false))
      - (ansible_virtualization_role == 'guest') == (verify_rdp_mtu_conf.stat.exists | default(false))
    fail_msg: >-
      RDP networking sysctls present/absent does not match host class
      ({{ 'VM guest' if ansible_virtualization_role == 'guest' else 'physical' }}).
    success_msg: >-
      RDP networking sysctls correctly
      {{ 'present (VM guest)' if ansible_virtualization_role == 'guest' else 'absent (physical)' }}

# GRD priority drop-in: only on the software-encode/none path.
- name: Stat GRD priority override
  ansible.builtin.stat:
    path: /etc/systemd/system/gnome-remote-desktop.service.d/priority.conf
  register: verify_grd_priority

- name: Check VA-API H.264 encode availability
  ansible.builtin.shell:
    cmd: vainfo --display drm 2>/dev/null | grep -q "VAProfileH264.*VAEntrypointEncSlice"
  register: verify_vaapi_h264
  changed_when: false
  failed_when: false

- name: Verify PAM nice limits deployed
  ansible.builtin.stat:
    path: /etc/security/limits.d/50-rdp-nice.conf
  register: verify_rdp_nice_limits

- name: Display RDP verification
  ansible.builtin.debug:
    msg: |
      RDP configured (reboot may be required):
      - gnome-remote-desktop: {{ verify_grd_service.status.UnitFileState }}
      - RDP backend (grdctl): {{ 'ENABLED' if 'Status: enabled' in verify_grd_status.stdout else 'NOT ENABLED' }}
      - Port 3389 listening: {{ 'YES' if verify_rdp_port.stdout | default('') | trim | length > 0 else 'not yet (may need reboot)' }}
      - TLS Cert: {{ verify_rdp_cert.stat.mode }}  Key: {{ verify_rdp_key.stat.mode }}
      - Host class: {{ 'VM guest' if ansible_virtualization_role == 'guest' else 'physical' }}
      - GPU vendor: {{ rdp_gpu_vendor | default('unknown') }} (hw-encode expected: {{ rdp_hw_encode_expected | default(false) }})
      - VA-API H.264 encode: {{ 'AVAILABLE' if verify_vaapi_h264.rc == 0 else 'not available (software/CPU)' }}
      - RDP net sysctls: {{ 'present (VM)' if verify_rdp_tcp_conf.stat.exists else 'absent (physical)' }}
      - GRD Nice=-10 priority: {{ 'configured (software path)' if verify_grd_priority.stat.exists else 'not set (hw-encode or n/a)' }}
      - PAM nice headroom: {{ 'present' if verify_rdp_nice_limits.stat.exists else 'absent (Nice=-10 on the user service would be ignored)' }}
