---
# VA-API Hardware Encoding Detection and Auto-Enablement
# Two-pronged approach:
# 1. Ansible-time: Check and enable if available now
# 2. Runtime: Deploy service that auto-enables when VA-API becomes available later

# ============================================================================
# INSTALL VA-API DRIVERS AND DETECTION TOOLS (vendor-aware)
# ============================================================================
# The correct VA driver depends on the GPU detected in gpu_groups.yml:
#   intel  (physical) -> intel-media-va-driver (iHD); Iris Xe etc.
#   amd    (physical) -> mesa-va-drivers (radeonsi/RADV)
#   virtio (VM)       -> mesa-va-drivers (Gallium VirGL state tracker)
#   nvidia (physical) -> nvidia-vaapi-driver (VDPAU->VA bridge)
#   none              -> tools only; software (CPU) encode
# Plus the GStreamer VA encoder plugin (vah264enc) that grd 50 needs for HW
# encode, wherever a hardware encoder is expected.

- name: Install VA-API stack (Ubuntu)
  ansible.builtin.apt:
    name: "{{ ({
              'intel':  ['intel-media-va-driver-non-free', 'gstreamer1.0-plugins-bad', 'vainfo'],
              'amd':    ['mesa-va-drivers', 'gstreamer1.0-plugins-bad', 'vainfo'],
              'virtio': ['mesa-va-drivers', 'gstreamer1.0-plugins-bad', 'vainfo'],
              'nvidia': ['nvidia-vaapi-driver', 'gstreamer1.0-plugins-bad', 'vainfo'],
              'none':   ['vainfo'],
            }[rdp_gpu_vendor | default('none')]) }}"
    state: present
    update_cache: true
  register: rdp_vaapi_ubuntu_install
  ignore_errors: true
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - has_gnome

- name: Install VA-API stack (Fedora)
  ansible.builtin.dnf:
    name: "{{ ({
              'intel':  ['intel-media-driver', 'gstreamer1-plugins-bad-free', 'libva-utils'],
              'amd':    ['mesa-va-drivers', 'gstreamer1-plugins-bad-free', 'libva-utils'],
              'virtio': ['mesa-va-drivers', 'gstreamer1-plugins-bad-free', 'libva-utils'],
              'nvidia': ['libva-utils', 'gstreamer1-plugins-bad-free'],
              'none':   ['libva-utils'],
            }[rdp_gpu_vendor | default('none')]) }}"
    state: present
  register: rdp_vaapi_fedora_install
  ignore_errors: true
  when:
    - ansible_facts['distribution'] == 'Fedora'
    - has_gnome

- name: Warn if VA-API stack install failed (Ubuntu)
  ansible.builtin.debug:
    msg: >-
      VA-API stack install for GPU '{{ rdp_gpu_vendor | default('none') }}' failed
      ({{ rdp_vaapi_ubuntu_install.msg | default('unknown') }}). Software (CPU)
      encoding fallback will be used. For NVIDIA, ensure the proprietary driver
      and nvidia-vaapi-driver are available.
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - has_gnome
    - rdp_vaapi_ubuntu_install is failed

# ============================================================================
# DEPLOY AUTO-DETECTION SERVICE (runs on every boot)
# ============================================================================

- name: Deploy VA-API auto-detection script
  ansible.builtin.copy:
    src: vaapi-check
    dest: /usr/local/bin/vaapi-check
    mode: '0755'
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome

- name: Deploy VA-API auto-detection systemd service
  ansible.builtin.copy:
    src: vaapi-check.service
    dest: /etc/systemd/system/vaapi-check.service
    mode: '0644'
  register: vaapi_service_deployed
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - vaapi_service_deployed.changed | default(false)

- name: Enable VA-API auto-detection service
  ansible.builtin.systemd:
    name: vaapi-check.service
    enabled: true
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome

# ============================================================================
# ANSIBLE-TIME CHECK: Enable now if VA-API already available
# ============================================================================

- name: Check VA-API H.264 encoding support
  ansible.builtin.shell:
    cmd: vainfo --display drm 2>&1 | grep -q "VAProfileH264High.*VAEntrypointEncSlice"
  register: vaapi_h264_check
  failed_when: false
  changed_when: false
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome

- name: Set VA-API H.264 availability fact
  ansible.builtin.set_fact:
    vaapi_h264_available: "{{ vaapi_h264_check.rc == 0 }}"
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome

- name: Run VA-API check script now (enables if available)
  ansible.builtin.command:
    cmd: /usr/local/bin/vaapi-check
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
  changed_when: false

# ============================================================================
# DISPLAY STATUS
# ============================================================================

- name: Display VA-API status
  ansible.builtin.debug:
    msg: |
      VA-API H.264 encoding: {{ 'AVAILABLE' if vaapi_h264_available | default(false) else 'NOT AVAILABLE (CPU fallback)' }}
      Auto-detection service: ENABLED (will auto-enable hardware encoding when VA-API becomes available)
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
