# Headroom for gnome-remote-desktop-handover to honour its Nice=-10 drop-in.
# Without this the drop-in is silently ignored: the handover daemon is a
# systemd *user* service, and an unprivileged manager cannot lower niceness
# below 0 unless RLIMIT_NICE allows it.
#
# Managed by Ansible (hyperi-developer rdp role) -- edits will be overwritten.
#
# The wildcard grants every user the *ability* to renice to -10; it does not
# renice anything itself. On a single-user developer workstation that is the
# intent. On a shared host it would be a mild local-DoS vector and should be
# scoped to a group instead.
*               soft    nice            -10
*               hard    nice            -10
