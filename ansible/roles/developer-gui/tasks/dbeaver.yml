---
# DBeaver Community — DB GUI client (universal: MySQL, Postgres, ClickHouse,
# SQLite, Oracle, MSSQL, etc.).

- name: Install DBeaver via Flatpak (Linux)
  community.general.flatpak:
    name: io.dbeaver.DBeaverCommunity
    state: present
    method: system
  become: true
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Install DBeaver via Homebrew cask (macOS)
  community.general.homebrew_cask:
    name: dbeaver-community
    state: present
  become: false
  environment: "{{ homebrew_cask_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'
