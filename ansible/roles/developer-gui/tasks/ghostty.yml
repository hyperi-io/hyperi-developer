---
# Ghostty terminal emulator installation
# Uses modular configuration: base config + platform-specific files

# ============================================================
# Variables
# ============================================================
- name: Set Ghostty config directory paths
  ansible.builtin.set_fact:
    ghostty_skel_dir: /etc/skel/.config/ghostty
    ghostty_macos_dir: "{{ ansible_facts['env'].HOME }}/Library/Application Support/com.mitchellh.ghostty"

# ============================================================
# Font Installation
# ============================================================
- name: Install JetBrains Mono font (Fedora)
  ansible.builtin.dnf:
    name: jetbrains-mono-fonts
    state: present
  when: ansible_facts['distribution'] == 'Fedora'

- name: Install JetBrains Mono font (Ubuntu)
  ansible.builtin.apt:
    name: fonts-jetbrains-mono
    state: present
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Install JetBrains Mono font via Homebrew cask (macOS)
  community.general.homebrew_cask:
    name: font-jetbrains-mono
    state: present
  become: false
  environment: "{{ homebrew_cask_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'

# ============================================================
# Ghostty Installation - Fedora (COPR)
# ============================================================
- name: Enable scottames/ghostty COPR (Fedora)
  community.general.copr:
    name: scottames/ghostty
    state: enabled
  when: ansible_facts['distribution'] == 'Fedora'

- name: Install Ghostty (Fedora)
  ansible.builtin.dnf:
    name: ghostty
    state: present
  when: ansible_facts['distribution'] == 'Fedora'

# ============================================================
# Ghostty Installation - Ubuntu (pre-built .deb)
# ============================================================
- name: Get latest Ghostty release
  ansible.builtin.uri:
    url: https://api.github.com/repos/mkasberg/ghostty-ubuntu/releases/latest
    return_content: true
  register: ghostty_latest
  when: ansible_facts['distribution'] == 'Ubuntu'
  check_mode: false

- name: Find .deb file for detected Ubuntu version
  ansible.builtin.set_fact:
    ghostty_deb_url: "{{ item.browser_download_url }}"
  loop: "{{ ghostty_latest.json.assets }}"
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - "'_amd64_' + ansible_facts['distribution_version'] + '.deb' in item.name"

- name: Download Ghostty .deb
  ansible.builtin.get_url:
    url: "{{ ghostty_deb_url }}"
    dest: /tmp/ghostty.deb
    mode: '0644'
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ghostty_deb_url is defined

- name: Install Ghostty (Ubuntu)
  ansible.builtin.apt:
    deb: /tmp/ghostty.deb
    state: present
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ghostty_deb_url is defined
    - not ansible_check_mode

- name: Remove Ghostty .deb
  ansible.builtin.file:
    path: /tmp/ghostty.deb
    state: absent
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ghostty_deb_url is defined

# ============================================================
# Ghostty Installation - macOS (Homebrew)
# ============================================================
- name: Install Ghostty via Homebrew cask (macOS)
  community.general.homebrew_cask:
    name: ghostty
    state: present
  become: false
  environment: "{{ homebrew_cask_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'

# ============================================================
# Linux Configuration Deployment (system-wide via /etc/skel)
# ============================================================
- name: Create Ghostty skel config directory (Linux)
  ansible.builtin.file:
    path: "{{ ghostty_skel_dir }}"
    state: directory
    mode: '0755'
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Deploy Ghostty base configuration (Linux)
  ansible.builtin.copy:
    src: ghostty/config
    dest: "{{ ghostty_skel_dir }}/config"
    mode: '0644'
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Deploy Ghostty Linux platform configuration
  ansible.builtin.copy:
    src: ghostty/platform-linux.conf
    dest: "{{ ghostty_skel_dir }}/platform-linux.conf"
    mode: '0644'
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# Vendored Solarized themes - always refreshed (managed files, not user-edited)
- name: Deploy Ghostty themes (Linux skel)
  ansible.builtin.copy:
    src: ghostty/themes/
    dest: "{{ ghostty_skel_dir }}/themes/"
    mode: '0644'
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# Deploy to current user as well (Linux)
- name: Create Ghostty config directory for actual user (Linux)
  ansible.builtin.file:
    path: "{{ user_home }}/.config/ghostty"
    state: directory
    mode: '0755'
    owner: "{{ actual_user }}"
    group: "{{ actual_user }}"
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Deploy Ghostty base configuration for actual user (Linux)
  ansible.builtin.copy:
    src: ghostty/config
    dest: "{{ user_home }}/.config/ghostty/config"
    mode: '0644'
    owner: "{{ actual_user }}"
    group: "{{ actual_user }}"
    force: false
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Deploy Ghostty Linux platform config for actual user
  ansible.builtin.copy:
    src: ghostty/platform-linux.conf
    dest: "{{ user_home }}/.config/ghostty/platform-linux.conf"
    mode: '0644'
    owner: "{{ actual_user }}"
    group: "{{ actual_user }}"
    force: false
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Deploy Ghostty themes for actual user (Linux)
  ansible.builtin.copy:
    src: ghostty/themes/
    dest: "{{ user_home }}/.config/ghostty/themes/"
    mode: '0644'
    owner: "{{ actual_user }}"
    group: "{{ actual_user }}"
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# Heal existing configs: the base config ships with force:false to preserve user
# edits, so older installs keep their (broken) builtin Solarized theme line. This
# rewrites just that line to the vendored themes without touching anything else.
- name: Fix stale Ghostty Solarized theme line in existing user config (Linux)
  ansible.builtin.replace:
    path: "{{ user_home }}/.config/ghostty/config"
    regexp: '^theme\s*=.*Solarized.*$'
    replace: 'theme = light:solarized-light,dark:solarized-dark'
  failed_when: false
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================
# macOS Configuration Deployment
# ============================================================
- name: Create Ghostty config directory (macOS)
  ansible.builtin.file:
    path: "{{ ghostty_macos_dir }}"
    state: directory
    mode: '0755'
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Deploy Ghostty base configuration (macOS)
  ansible.builtin.copy:
    src: ghostty/config
    dest: "{{ ghostty_macos_dir }}/config"
    mode: '0644'
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Deploy Ghostty macOS platform configuration
  ansible.builtin.copy:
    src: ghostty/platform-macos.conf
    dest: "{{ ghostty_macos_dir }}/platform-macos.conf"
    mode: '0644'
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Deploy Ghostty themes (macOS)
  ansible.builtin.copy:
    src: ghostty/themes/
    dest: "{{ ghostty_macos_dir }}/themes/"
    mode: '0644'
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

# ============================================================
# CLI on PATH
# ============================================================
# Linux gets this free: the .deb and COPR both drop /usr/bin/ghostty.
#
# macOS does not. The cask installs Ghostty.app plus manpages and completions,
# but no binary -- so `ghostty +validate-config`, `ghostty +list-themes` and
# the rest are unreachable without typing the full bundle path. Upstream
# documents no way to fix this, so we symlink it ourselves.
#
# /usr/local/bin because it is on the default macOS PATH and is not Homebrew's
# (brew owns /opt/homebrew on Apple Silicon, and dropping a non-brew symlink in
# its bin would upset brew doctor and risk cleanup removing it). It is also
# where the rest of our own tools go.
#
# The target path is stable across Ghostty's in-place auto-updates.
- name: Check Ghostty.app is present before linking (macOS)
  ansible.builtin.stat:
    path: /Applications/Ghostty.app/Contents/MacOS/ghostty
  register: ghostty_macos_app
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Ensure /usr/local/bin exists (macOS)
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    mode: '0755'
  become: true
  when:
    - ansible_facts['distribution'] == 'MacOSX'
    - ghostty_macos_app.stat.exists | default(false)

- name: Put the Ghostty CLI on PATH (macOS)
  ansible.builtin.file:
    src: /Applications/Ghostty.app/Contents/MacOS/ghostty
    dest: /usr/local/bin/ghostty
    state: link
    force: true
  become: true
  when:
    - ansible_facts['distribution'] == 'MacOSX'
    - ghostty_macos_app.stat.exists | default(false)

- name: Verify the Ghostty CLI resolves on PATH (macOS)
  ansible.builtin.command:
    cmd: ghostty --version
  register: ghostty_cli_check
  changed_when: false
  failed_when: false
  become: false
  when:
    - ansible_facts['distribution'] == 'MacOSX'
    - ghostty_macos_app.stat.exists | default(false)

- name: Warn if the Ghostty CLI is still not reachable (macOS)
  ansible.builtin.debug:
    msg: >-
      Ghostty CLI symlinked to /usr/local/bin/ghostty but `ghostty --version`
      did not run. Check /usr/local/bin is on your PATH.
  when:
    - ansible_facts['distribution'] == 'MacOSX'
    - ghostty_macos_app.stat.exists | default(false)
    - ghostty_cli_check.rc | default(1) != 0
