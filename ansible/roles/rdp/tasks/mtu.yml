---
# MTU settings to prevent packet fragmentation.
# VM guests only - not applied to physical machines.

- name: Configure MTU settings for RDP (VM guests only)
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-rdp-mtu.conf
    content: |
      # RDP MTU Settings

      # Enable MTU probing to prevent fragmentation
      net.ipv4.tcp_mtu_probing = 1
      net.ipv4.ip_no_pmtu_disc = 0
    mode: '0644'
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - ansible_virtualization_role == 'guest'

- name: Remove RDP MTU sysctls on physical machines
  ansible.builtin.file:
    path: /etc/sysctl.d/99-rdp-mtu.conf
    state: absent
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - ansible_virtualization_role != 'guest'
