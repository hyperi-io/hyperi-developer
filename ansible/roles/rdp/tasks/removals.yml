---
# Tombstones for the retired xrandr refresh-rate cap.
#
# The idea was to cap the display to 30Hz to cut software-encode CPU load. It
# never worked: it drove xrandr, and GNOME here is Wayland, where XWayland's
# RandR cannot set the compositor's mode. Every call failed, and the script
# swallowed the lot with `2>/dev/null || true`, so it looked fine -- the old
# verify even asserted the script was PRESENT and called that a pass.
#
# The real lever is GRD's own max-framerate, which stock GRD hardcodes to
# 60fps for the PipeWire stream. See the role README.
#
# Ansible cannot remove what we simply stop declaring, so hosts provisioned by
# an older revision keep the dead script and its autostart entry until we say
# otherwise. That is what these are for.

- name: Remove the retired xrandr refresh-rate machinery
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/local/bin/rdp-set-refresh-rate
    - /etc/xdg/autostart/rdp-refresh-rate.desktop
    - /etc/hyperi-developer/rdp-refresh-rate
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# Every host we provisioned before 2026-07-17 has the well-known password
# "hyperi" on a daemon listening on 3389. credentials.yml alone will NOT fix
# them: it generates only when no credentials file exists, and these hosts have
# no file -- so they would get a fresh password, which is exactly what we want,
# but only once this marker tells us they have been dealt with.
#
# The marker is what makes the remediation observable. Without it we cannot
# tell a host that was fixed from one that never had the problem.
- name: Check whether this host predates per-host RDP passwords
  ansible.builtin.stat:
    path: /etc/hyperi/rdp-credentials
  register: rdp_creds_present
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome

- name: Warn about the retired shared RDP password
  ansible.builtin.debug:
    msg: >-
      This host has no {{ rdp_credentials_file }}, so it may still be using the
      old shared default password on port 3389. A new random one is being
      generated now and will be printed at the end of this run.
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - not (rdp_creds_present.stat.exists | default(false))
    - rdp_password is not defined
