---
# GNOME dconf settings for RDP optimization
# Uses system-wide dconf profile (/etc/dconf/db/local.d/) instead of
# per-user dconf writes, which require a D-Bus session and fail over SSH.

# Note: Most RDP settings are configured via grdctl in service.yml
# This file handles GNOME desktop optimisations for RDP performance

# The system-wide dconf "local" database and its keyfile directory are not
# present by default on a fresh GNOME install (confirmed missing on Ubuntu
# 26.04). Create the directory and ensure the user profile references the
# local system-db, otherwise the deployed keyfile is never read.
- name: Ensure system dconf keyfile directory exists
  ansible.builtin.file:
    path: /etc/dconf/db/local.d
    state: directory
    mode: '0755'
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome

- name: Ensure dconf user profile reads the local system-db
  ansible.builtin.lineinfile:
    path: /etc/dconf/profile/user
    line: "{{ item }}"
    create: true
    mode: '0644'
  loop:
    - "user-db:user"
    - "system-db:local"
  register: rdp_dconf_profile
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome

- name: Deploy RDP performance dconf profile
  ansible.builtin.copy:
    src: dconf-rdp-performance
    dest: /etc/dconf/db/local.d/00-rdp-performance
    mode: '0644'
  register: rdp_dconf_deployed
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome

- name: Update dconf database
  ansible.builtin.command:
    cmd: dconf update
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - (rdp_dconf_deployed.changed | default(false)) or (rdp_dconf_profile.changed | default(false))
  changed_when: true

- name: Display dconf status
  ansible.builtin.debug:
    msg: "GNOME Remote Desktop configured via grdctl (system service mode) - animations disabled via system dconf profile"
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
