---
# Mint a per-host RDP password, or use the one the operator supplied.
#
# IDEMPOTENCE IS THE WHOLE PROBLEM HERE. A naive `lookup('password')` or a
# fresh random string on every run would change the password on every converge
# and silently lock out whoever is already using it. So:
#
#   1. operator set rdp_password  -> use it, touch nothing
#   2. we generated one before    -> reuse it from the credentials file
#   3. neither                    -> generate, record, report once
#
# The file is the state. Delete it and re-run to rotate.

- name: Read a previously generated RDP password
  ansible.builtin.slurp:
    src: "{{ rdp_credentials_file }}"
  register: rdp_existing_creds
  failed_when: false
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - rdp_password is not defined

# special=false on purpose: this gets typed into RDP clients and pasted through
# terminals, and grdctl takes it as a shell argument. Length buys the entropy
# back -- 24 alphanumerics is ~143 bits.
- name: Generate an RDP password for this host
  ansible.builtin.set_fact:
    rdp_generated_password: >-
      {{ lookup('community.general.random_string',
                length=rdp_password_length,
                special=false) }}
  no_log: true
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - rdp_password is not defined
    - rdp_existing_creds.content is not defined

# One fact, three sources, so every later task reads the same thing and the
# precedence lives in exactly one place.
- name: Settle the effective RDP password
  ansible.builtin.set_fact:
    rdp_effective_password: >-
      {{ rdp_password
         if rdp_password is defined
         else (rdp_existing_creds.content | b64decode | trim
               if rdp_existing_creds.content is defined
               else rdp_generated_password) }}
  no_log: true
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome

- name: Create the hyperi config directory
  ansible.builtin.file:
    path: "{{ rdp_credentials_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - rdp_password is not defined

# Only record what WE generated. An operator-supplied password is theirs to
# manage -- writing it to disk would leak it somewhere they did not choose.
- name: Record the generated RDP password
  ansible.builtin.copy:
    content: "{{ rdp_generated_password }}\n"
    dest: "{{ rdp_credentials_file }}"
    owner: root
    group: root
    mode: '0600'
  no_log: true
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - rdp_password is not defined
    - rdp_generated_password is defined

- name: Report the generated RDP password
  ansible.builtin.debug:
    msg: |
      A random RDP password was generated for this host.

        username: {{ rdp_username }}
        password: {{ rdp_generated_password }}

      Saved to {{ rdp_credentials_file }} (root-only). This is the only time it
      is printed. To rotate: delete that file and re-run. To pin your own, set
      rdp_password.
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome
    - rdp_password is not defined
    - rdp_generated_password is defined
