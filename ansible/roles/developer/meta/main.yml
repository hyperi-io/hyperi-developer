---
galaxy_info:
  author: HyperI
  description: Hyperi base developer environment setup
  company: HyperI
  license: Apache-2.0
  min_ansible_version: "2.20"
  platforms:
    - name: Fedora
      versions: ['42']
    - name: Ubuntu
      versions: ['noble']
    - name: macOS
      versions: ['all']

# The Astral suite (uv + ruff + ty) is a base component -- uv is general-purpose
# here (runs ansible on macOS, semgrep, hyperi-ci, gext; manages Python
# versions), so the whole suite installs with the base.
dependencies:
  - role: astral
