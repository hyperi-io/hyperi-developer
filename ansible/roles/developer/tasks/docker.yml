---
# Docker installation
#
# Linux: Docker Engine (CE) from Docker's official APT/DNF repo.
# macOS:  Docker CLI (formula, not cask) — Docker Desktop is intentionally
#         NOT installed. Users pick their own daemon: colima, orbstack,
#         podman, etc. See README for alternatives.

# ============================================================================
# Linux — Add Docker repository
# ============================================================================

- name: Add Docker repository (Fedora)
  ansible.builtin.command:
    cmd: dnf config-manager addrepo --from-repofile=https://download.docker.com/linux/fedora/docker-ce.repo --overwrite
  args:
    creates: /etc/yum.repos.d/docker-ce.repo
  when: ansible_facts['distribution'] == 'Fedora'

- name: Configure Docker repository (Ubuntu)
  block:
    - name: Create Docker GPG keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: "{{ docker_gpg_url }}"
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    # Docker only publishes repos for Ubuntu LTS releases (jammy, noble).
    # Map non-LTS interim releases to the nearest supported LTS.
    - name: Determine Docker repo codename
      ansible.builtin.set_fact:
        docker_codename: >-
          {{ (ansible_facts['distribution_version'] is version('24.04', '>'))
             | ternary('noble', ansible_facts['distribution_release']) }}

    - name: Add Docker repository
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: "{{ docker_repo_url }}"
        suites: "{{ docker_codename }}"
        components: stable
        signed_by: /etc/apt/keyrings/docker.asc
        architectures: "{{ docker_arch }}"
        state: present

    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: true

  when: ansible_facts['distribution'] == 'Ubuntu'

# ============================================================================
# Linux — remove conflicting packages
# ============================================================================

- name: Remove Podman (conflicts with Docker on Fedora)
  ansible.builtin.dnf:
    name:
      - podman
      - podman-docker
      - buildah
      - skopeo
      - toolbox
    state: absent
  when: ansible_facts['distribution'] == 'Fedora'
  failed_when: false  # OK if packages don't exist

# ============================================================================
# Linux — install Docker Engine (CLI + daemon + buildx + compose)
# ============================================================================

- name: Install Docker CE (Fedora)
  ansible.builtin.dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  when: ansible_facts['distribution'] == 'Fedora'

- name: Install Docker CE (Ubuntu)
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  when: ansible_facts['distribution'] == 'Ubuntu'

# ============================================================================
# macOS — install Docker CLI only (no Docker Desktop)
# ============================================================================

- name: Install Docker CLI via Homebrew (macOS)
  community.general.homebrew:
    name:
      - docker
      - docker-buildx
      - docker-compose
    state: present
  become: false
  environment: "{{ homebrew_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'

# Without this, `docker compose` and `docker buildx` are "unknown command" on
# every Mac we provision. Docker Desktop used to drop its plugins where the CLI
# already looks; brew puts them under its own prefix, and the CLI does not scan
# there unless told. Installing the formulae is only half the job.
- name: Find the Homebrew prefix (macOS)
  ansible.builtin.command:
    cmd: brew --prefix
  register: developer_brew_prefix
  changed_when: false
  become: false
  environment: "{{ homebrew_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Read the existing Docker CLI config (macOS)
  ansible.builtin.slurp:
    src: "{{ ansible_facts['env'].HOME }}/.docker/config.json"
  register: developer_docker_cfg_raw
  become: false
  failed_when: false
  when: ansible_facts['distribution'] == 'MacOSX'

# MERGE, never overwrite: a real config.json holds `auths` (registry
# credentials) and `currentContext`. Writing a fresh file here would log the
# developer out of every registry they use.
- name: Point the Docker CLI at Homebrew's plugins (macOS)
  ansible.builtin.copy:
    content: >-
      {{
        (developer_docker_cfg_raw.content | default('') | b64decode | from_json
         if developer_docker_cfg_raw.content is defined else {})
        | combine({
            'cliPluginsExtraDirs': [
              developer_brew_prefix.stdout ~ '/lib/docker/cli-plugins'
            ]
          })
        | to_nice_json
      }}
    dest: "{{ ansible_facts['env'].HOME }}/.docker/config.json"
    mode: '0600'
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Display Docker daemon hint (macOS)
  ansible.builtin.debug:
    msg: |
      Docker CLI installed (no Docker Desktop bundled — by design).

      You still need a daemon. colima is what we use:

        colima start

      It runs docker-ce in a small VM on Apple's own Virtualization.framework,
      so it is a delivery mechanism for the same engine Linux runs natively,
      not a different one. The CLI installed here connects to it over the
      standard socket.

      Not OrbStack: it requires a paid licence for commercial use.
  when: ansible_facts['distribution'] == 'MacOSX'

# ============================================================================
# Linux — group memberships + service
# ============================================================================

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  notify: Inform user to logout
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# Verification
# ============================================================================

- name: Verify Docker (Linux)
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false
  failed_when: docker_version.rc != 0
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Verify Docker CLI (macOS — daemon may not be running yet)
  ansible.builtin.command: docker --version
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:{{ ansible_facts['env'].PATH }}"
  register: docker_version
  changed_when: false
  failed_when: docker_version.rc != 0
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Display Docker version
  ansible.builtin.debug:
    msg: "Docker installed: {{ docker_version.stdout | default('not detected') }}"
