---
# Verification - Base developer tools (Tier 1: Functional checks)

# Docker verification
- name: Verify Docker installed (Linux)
  ansible.builtin.command: docker --version
  register: verify_docker
  changed_when: false
  failed_when: verify_docker.rc != 0
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Verify Docker Desktop installed (macOS - CLI available after manual launch)
  ansible.builtin.stat:
    path: /Applications/Docker.app
  register: verify_docker_app
  failed_when: not verify_docker_app.stat.exists
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Set Docker version fact for macOS
  ansible.builtin.set_fact:
    verify_docker:
      stdout: "Docker Desktop installed (launch manually for CLI access)"
      rc: 0
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Verify Docker service enabled (will be active after reboot)
  ansible.builtin.systemd:
    name: docker.service
  register: verify_docker_service
  failed_when: verify_docker_service.status.UnitFileState != 'enabled'
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# Docker group membership requires logout/reboot - skip verification
# kubectl/Helm/Terraform verification moved to iac role (installed there)

# Git verification
- name: Verify Git
  ansible.builtin.command: git --version
  register: verify_git
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:{{ user_home }}/.cargo/bin:{{ ansible_facts['env'].PATH }}"
  changed_when: false
  failed_when: verify_git.rc != 0

- name: Verify Git subtree (Linux - part of git package)
  ansible.builtin.command: git subtree --help
  register: verify_git_subtree
  changed_when: false
  failed_when: verify_git_subtree.rc != 0
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Verify Git subtree (macOS - skip, not in Homebrew git)
  ansible.builtin.set_fact:
    verify_git_subtree:
      stdout: "git subtree not included in Homebrew git (install separately if needed)"
      rc: 0
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Verify Git LFS filter installed
  ansible.builtin.command: git lfs env
  register: verify_git_lfs
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:{{ user_home }}/.cargo/bin:{{ ansible_facts['env'].PATH }}"
  changed_when: false
  failed_when: verify_git_lfs.rc != 0
  become: false
  become_user: "{{ actual_user }}"

# Python tools
- name: Verify UV
  ansible.builtin.command: "{{ user_home }}/.cargo/bin/uv --version"
  register: verify_uv
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:{{ user_home }}/.cargo/bin:{{ ansible_facts['env'].PATH }}"
  changed_when: false
  failed_when: verify_uv.rc != 0
  become: false
  become_user: "{{ actual_user }}"

- name: Verify UV can list Python versions
  ansible.builtin.command: "{{ user_home }}/.cargo/bin/uv python list"
  register: verify_uv_python
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:{{ user_home }}/.cargo/bin:{{ ansible_facts['env'].PATH }}"
  changed_when: false
  failed_when: verify_uv_python.rc != 0
  become: false
  become_user: "{{ actual_user }}"

# Cloud tools
- name: Verify AWS CLI
  ansible.builtin.command: aws --version
  register: verify_aws
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:{{ user_home }}/.cargo/bin:{{ ansible_facts['env'].PATH }}"
  changed_when: false
  failed_when: verify_aws.rc != 0

- name: Verify Azure CLI (Linux)
  ansible.builtin.command: az version
  register: verify_azure
  changed_when: false
  failed_when: verify_azure.rc != 0
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Verify Azure CLI (macOS)
  ansible.builtin.command: az version
  environment: "{{ homebrew_env }}"
  register: verify_azure
  changed_when: false
  failed_when: verify_azure.rc != 0
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Verify Google Cloud CLI (Linux)
  ansible.builtin.command: gcloud version --format=json
  register: verify_gcloud
  changed_when: false
  failed_when: verify_gcloud.rc != 0
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Verify Google Cloud CLI (macOS)
  ansible.builtin.command: gcloud version --format=json
  environment: "{{ homebrew_env }}"
  register: verify_gcloud
  changed_when: false
  failed_when: verify_gcloud.rc != 0
  when: ansible_facts['distribution'] == 'MacOSX'

# Node.js + semantic-release
- name: Verify Node.js (Linux)
  ansible.builtin.command: node --version
  register: verify_node
  changed_when: false
  failed_when: verify_node.rc != 0
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Verify Node.js (macOS)
  ansible.builtin.command: node --version
  environment: "{{ homebrew_env }}"
  register: verify_node
  changed_when: false
  failed_when: verify_node.rc != 0
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Verify semantic-release
  ansible.builtin.command: "{{ user_home }}/.npm-global/bin/semantic-release --version"
  register: verify_semrel
  changed_when: false
  failed_when: verify_semrel.rc != 0
  become: false

# Claude Code CLI
- name: Verify Claude Code CLI (Linux)
  ansible.builtin.command: "{{ user_home }}/.local/bin/claude --version"
  register: verify_claude
  changed_when: false
  failed_when: verify_claude.rc != 0
  become: false
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Verify Claude Code CLI (macOS)
  ansible.builtin.command: claude --version
  environment: "{{ homebrew_env }}"
  register: verify_claude
  changed_when: false
  failed_when: verify_claude.rc != 0
  when: ansible_facts['distribution'] == 'MacOSX'

# Gitleaks
- name: Verify Gitleaks (Linux)
  ansible.builtin.command: gitleaks version
  register: verify_gitleaks
  changed_when: false
  failed_when: verify_gitleaks.rc != 0
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Verify Gitleaks (macOS)
  ansible.builtin.command: gitleaks version
  environment: "{{ homebrew_env }}"
  register: verify_gitleaks
  changed_when: false
  failed_when: verify_gitleaks.rc != 0
  when: ansible_facts['distribution'] == 'MacOSX'

# act — local GitHub Actions runner
- name: Verify act (Linux)
  ansible.builtin.command: act --version
  register: verify_act
  changed_when: false
  failed_when: verify_act.rc != 0
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Verify act (macOS)
  ansible.builtin.command: act --version
  environment: "{{ homebrew_env }}"
  register: verify_act
  changed_when: false
  failed_when: verify_act.rc != 0
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Verify yq
  ansible.builtin.command: yq --version
  register: verify_yq
  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:{{ user_home }}/.cargo/bin:{{ ansible_facts['env'].PATH }}"
  changed_when: false
  failed_when: verify_yq.rc != 0

# Config file validation
- name: Verify DNF performance config (Fedora)
  ansible.builtin.stat:
    path: /etc/dnf/dnf.conf.d/99-performance.conf
  register: verify_dnf_conf
  failed_when: not verify_dnf_conf.stat.exists
  when:
    - ansible_facts['distribution'] == 'Fedora'
    - use_fastestmirror | default(true)

- name: Verify APT performance config (Ubuntu)
  ansible.builtin.stat:
    path: /etc/apt/apt.conf.d/99-performance
  register: verify_apt_conf
  failed_when: not verify_apt_conf.stat.exists
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - use_fastestmirror | default(true)

- name: Display base tools verification (Linux)
  ansible.builtin.debug:
    msg: |
      ✅ Base Developer Tools Verified:
      - Docker: {{ verify_docker.stdout }} (service enabled ✅)
      - Docker group: User added (logout required for shell access)
      - Git: {{ verify_git.stdout }}
      - Git subtree: ✅
      - Git LFS: ✅ Filters installed
      - UV: {{ verify_uv.stdout }} (can list Python versions ✅)
      - AWS CLI: {{ verify_aws.stdout }}
      - Azure CLI: {{ verify_azure.stdout | default('installed') }}
      - Google Cloud CLI: {{ verify_gcloud.stdout | default('installed') }}
      - Node.js: {{ verify_node.stdout | default('installed') }}
      - semantic-release: {{ verify_semrel.stdout | default('installed') }}
      - Claude Code CLI: {{ verify_claude.stdout | default('installed') }}
      - Gitleaks: {{ verify_gitleaks.stdout | default('installed') }}
      - act: {{ verify_act.stdout | default('installed') }}
      - yq: {{ verify_yq.stdout }}
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Display base tools verification (macOS)
  ansible.builtin.debug:
    msg: |
      ✅ Base Developer Tools Verified:
      - Docker Desktop: Installed (launch manually for CLI access)
      - Git: {{ verify_git.stdout }}
      - Git subtree: ✅
      - Git LFS: ✅ Filters installed
      - UV: {{ verify_uv.stdout }} (can list Python versions ✅)
      - AWS CLI: {{ verify_aws.stdout }}
      - Azure CLI: {{ verify_azure.stdout | default('installed') }}
      - Google Cloud CLI: {{ verify_gcloud.stdout | default('installed') }}
      - Node.js: {{ verify_node.stdout | default('installed') }}
      - semantic-release: {{ verify_semrel.stdout | default('installed') }}
      - Claude Code CLI: {{ verify_claude.stdout | default('installed') }}
      - Gitleaks: {{ verify_gitleaks.stdout | default('installed') }}
      - act: {{ verify_act.stdout | default('installed') }}
      - yq: {{ verify_yq.stdout }}
  when: ansible_facts['distribution'] == 'MacOSX'
