---
# Kubernetes tools installation (kubectl, k9s, kubectx/kubens, Minikube, ArgoCD, Freelens, dive)

# ============================================================================
# KUBECTL - Dynamic version detection
# ============================================================================

- name: Detect latest stable Kubernetes version
  ansible.builtin.uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: true
  register: k8s_stable_version
  delegate_to: localhost
  become: false
  check_mode: false

- name: Extract Kubernetes minor version
  ansible.builtin.set_fact:
    k8s_version: "{{ k8s_stable_version.content | trim | regex_replace('^v([0-9]+\\.[0-9]+).*', '\\1') }}"

- name: Display detected Kubernetes version
  ansible.builtin.debug:
    msg: "Using Kubernetes {{ k8s_version }}"

# Fedora
- name: Add Kubernetes repository (Fedora)
  ansible.builtin.yum_repository:
    name: kubernetes
    description: Kubernetes
    baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/"
    enabled: true
    gpgcheck: true
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/repodata/repomd.xml.key"
  when: ansible_facts['distribution'] == 'Fedora'

- name: Install kubectl (Fedora)
  ansible.builtin.dnf:
    name: kubectl
    state: present
  when: ansible_facts['distribution'] == 'Fedora'

# Ubuntu
- name: Add Kubernetes GPG key (Ubuntu)
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: '0644'
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Add Kubernetes repository (Ubuntu)
  ansible.builtin.deb822_repository:
    name: kubernetes
    types: deb
    uris: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/"
    suites: "/"
    signed_by: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    state: present
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Install kubectl (Ubuntu)
  ansible.builtin.apt:
    name: kubectl
    state: present
    update_cache: true
  when: ansible_facts['distribution'] == 'Ubuntu'


# ============================================================================
# LINUX - Binary downloads for k9s, kubectx/kubens, Minikube, ArgoCD, dive
# ============================================================================

- name: Install Kubernetes CLI tools via binary download (Linux)
  block:
    # k9s
    - name: Get latest k9s version
      ansible.builtin.uri:
        url: https://api.github.com/repos/derailed/k9s/releases/latest
        return_content: true
      register: k9s_latest
      check_mode: false

    - name: Download and extract k9s
      ansible.builtin.unarchive:
        src: "https://github.com/derailed/k9s/releases/download/{{ k9s_latest.json.tag_name }}/k9s_Linux_amd64.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        include: k9s
        mode: '0755'
      when: not ansible_check_mode

    # kubectx and kubens
    - name: Get latest kubectx version
      ansible.builtin.uri:
        url: https://api.github.com/repos/ahmetb/kubectx/releases/latest
        return_content: true
      register: kubectx_latest
      check_mode: false

    - name: Download kubectx
      ansible.builtin.get_url:
        url: "https://github.com/ahmetb/kubectx/releases/download/{{ kubectx_latest.json.tag_name }}/kubectx"
        dest: /usr/local/bin/kubectx
        mode: '0755'

    - name: Download kubens
      ansible.builtin.get_url:
        url: "https://github.com/ahmetb/kubectx/releases/download/{{ kubectx_latest.json.tag_name }}/kubens"
        dest: /usr/local/bin/kubens
        mode: '0755'

    # Minikube
    - name: Download Minikube
      ansible.builtin.get_url:
        url: https://github.com/kubernetes/minikube/releases/latest/download/minikube-linux-amd64
        dest: /tmp/minikube-linux-amd64
        mode: '0755'

    - name: Install Minikube
      ansible.builtin.copy:
        src: /tmp/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'
        remote_src: true
      when: not ansible_check_mode

    - name: Remove Minikube installer
      ansible.builtin.file:
        path: /tmp/minikube-linux-amd64
        state: absent

    # ArgoCD CLI
    - name: Get latest ArgoCD version
      ansible.builtin.uri:
        url: https://api.github.com/repos/argoproj/argo-cd/releases/latest
        return_content: true
      register: argocd_latest
      check_mode: false

    - name: Download ArgoCD CLI
      ansible.builtin.get_url:
        url: "https://github.com/argoproj/argo-cd/releases/download/{{ argocd_latest.json.tag_name }}/argocd-linux-amd64"
        dest: /usr/local/bin/argocd
        mode: '0755'

    # dive
    - name: Get latest dive version
      ansible.builtin.uri:
        url: https://api.github.com/repos/wagoodman/dive/releases/latest
        return_content: true
      register: dive_latest
      check_mode: false

    - name: Download and extract dive
      ansible.builtin.unarchive:
        src: "https://github.com/wagoodman/dive/releases/download/{{ dive_latest.json.tag_name }}/dive_{{ dive_latest.json.tag_name | regex_replace('^v', '') }}_linux_amd64.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        include: dive
        mode: '0755'
      when: not ansible_check_mode

  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# Freelens (Kubernetes IDE) - native packages
# Ubuntu: official APT repository (auto-updates via apt)
# Fedora: direct .rpm from GitHub releases (no official dnf repo upstream)

- name: Install Freelens (Ubuntu - official apt repo)
  block:
    - name: Add Freelens signing key
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/freelensapp/freelens/refs/heads/main/freelens/build/apt/freelens.asc
        dest: /etc/apt/keyrings/freelens.asc
        mode: '0644'

    - name: Add Freelens apt repository (deb822)
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/freelensapp/freelens/refs/heads/main/freelens/build/apt/freelens.sources
        dest: /etc/apt/sources.list.d/freelens.sources
        mode: '0644'

    - name: Install Freelens
      ansible.builtin.apt:
        name: freelens
        state: present
        update_cache: true
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - has_gnome | default(false)

- name: Install Freelens (Fedora - .rpm from GitHub releases)
  block:
    - name: Get latest Freelens release
      ansible.builtin.uri:
        url: https://api.github.com/repos/freelensapp/freelens/releases/latest
        return_content: true
      register: freelens_latest
      check_mode: false

    - name: Find Freelens .rpm asset (x86_64)
      ansible.builtin.set_fact:
        freelens_rpm_url: "{{ item.browser_download_url }}"
      loop: "{{ freelens_latest.json.assets }}"
      when: item.name is search('\\.x86_64\\.rpm$')

    - name: Install Freelens from .rpm
      ansible.builtin.dnf:
        name: "{{ freelens_rpm_url }}"
        state: present
        disable_gpg_check: true
      when:
        - freelens_rpm_url is defined
        - not ansible_check_mode
  when:
    - ansible_facts['distribution'] == 'Fedora'
    - has_gnome | default(false)

# ============================================================================
# macOS - Install via Homebrew
# ============================================================================

- name: Install Kubernetes tools via Homebrew (macOS)
  block:
    - name: Install kubectl
      community.general.homebrew:
        name: kubernetes-cli
        state: present

    - name: Install k9s
      community.general.homebrew:
        name: k9s
        state: present

    - name: Install kubectx
      community.general.homebrew:
        name: kubectx
        state: present

    - name: Install minikube
      community.general.homebrew:
        name: minikube
        state: present

    - name: Install ArgoCD CLI
      community.general.homebrew:
        name: argocd
        state: present

    - name: Install dive
      community.general.homebrew:
        name: dive
        state: present

  become: false
  environment: "{{ homebrew_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'
