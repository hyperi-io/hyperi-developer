---
# Development utilities installation

# ============================================================================
# CLI UTILITIES (no desktop required)
# ============================================================================

# Dropped from this list by decision, and tombstoned in removals.yml so they
# leave hosts that already have them: telnet, net-tools, nmap, whois,
# traceroute, tree, httpie. They are either superseded (ss over netstat, curl
# over httpie, eza/fd over tree) or things a developer box has no business
# shipping by default (nmap, telnet). Install them yourself if you want them.
- name: Install CLI utilities (Fedora)
  ansible.builtin.dnf:
    name:
      - jq
      - gron                  # make JSON greppable
      - bat
      - fzf
      - ripgrep
      - fd-find
      - git-delta             # git diff pager. NOT `delta` -- that is a binary-diff tool
      - moreutils             # sponge, ts, vipe, chronic
      - miller                # data processing (mlr command)
      - rsync
      - tmux
      - htop
      - lsof
      - needrestart           # flag daemons needing restart after upgrades (cf. dnf needs-restarting)
      - wget
      - bind-utils
      - ShellCheck
      - postgresql
      - ansible
      - parallel
      - python3               # base interpreter
      - python3-pytest        # testing framework
      - age                   # file encryption
    state: present
  when: ansible_facts['distribution'] == 'Fedora'

- name: Install CLI utilities (Ubuntu)
  ansible.builtin.apt:
    name:
      - jq
      - gron                  # make JSON greppable
      - bat
      - fzf
      - ripgrep
      - fd-find
      - sd                    # sane sed replacement
      - git-delta             # git diff pager. NOT `delta` -- on Ubuntu that
                              # name belongs to an ancient binary-diff tool
      - moreutils             # sponge, ts, vipe, chronic
      - miller                # data processing (mlr command)
      - rsync
      - tmux
      - htop
      - lsof
      - needrestart           # flag daemons needing restart after upgrades
      - wget
      - dnsutils
      - netcat-openbsd
      - shellcheck
      - postgresql-client
      - ansible
      - parallel
      - python3               # base interpreter
      - python3-pytest        # testing framework
      - age                   # file encryption
    state: present
  when: ansible_facts['distribution'] == 'Ubuntu'

# macOS utility list intentionally omits `ansible` and `python@3`:
# - ansible: installed via uv as a tool (`uv tool install ansible-core
#   --with ansible`) so it lives in its own isolated env and tracks uv's
#   Python. A brew ansible would shadow it and create two ansibles on PATH.
# - python@3: brew's keg-managed Python is unnecessary — uv-managed Python
#   versions (via `uv python install`) are the corporate standard and
#   self-contained per-tool.
- name: Install CLI utilities (macOS)
  community.general.homebrew:
    name:
      - jq
      - gron                  # make JSON greppable
      - bat
      - fzf
      - ripgrep
      - fd
      - sd                    # sane sed replacement
      - git-delta             # git diff pager (brew aliases `delta` to this)
      - moreutils             # sponge, ts, vipe, chronic
      - lazygit               # git TUI
      - dive                  # docker image layer explorer (brew-core has it;
                              # Linux takes a GitHub binary, see k8s.yml)
      - trufflehog            # secret scanner
      - miller                # data processing (mlr command)
      - rsync
      - tmux
      - htop
      - wget
      - bind
      - netcat
      - shellcheck
      - postgresql@16
      - yq
      - parallel
      - pytest                # testing framework
      - age                   # file encryption
    state: present
  environment: "{{ homebrew_env }}"
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

# yq - Binary download (Linux only, macOS uses Homebrew above)
- name: Install yq
  block:
    - name: Download yq
      ansible.builtin.get_url:
        url: "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_{{ hyperi_arch_deb }}"
        dest: /usr/local/bin/yq
        mode: '0755'

  rescue:
    - name: Record that yq did not install
      # noqa: var-naming[no-role-prefix] -- deploy_warnings is deliberately not
      # role-prefixed: it is the shared accumulator playbooks/main.yml reports
      # from. See docs/resilient-deploy.md.
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['yq: ' ~ (ansible_failed_result.msg | default('download failed'))] }}

  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# sd - sane sed replacement (binary download for Fedora, apt for Ubuntu)
- name: Install sd (Fedora)
  block:
    - name: Get latest sd version
      ansible.builtin.uri:
        url: https://api.github.com/repos/chmln/sd/releases/latest
        return_content: true
      register: sd_release

    # sd is the one that punishes a naive arch swap. Its arm64 build is
    # MUSL-ONLY -- there is no aarch64-unknown-linux-gnu asset, and asking for
    # one 404s (verified). amd64 has both gnu and musl. So the libc token
    # changes with the arch, not just the arch token.
    - name: Determine the sd release target
      ansible.builtin.set_fact:
        sd_target: >-
          {{ 'aarch64-unknown-linux-musl'
             if hyperi_arch_deb == 'arm64'
             else 'x86_64-unknown-linux-gnu' }}

    - name: Download and extract sd
      ansible.builtin.unarchive:
        src: "https://github.com/chmln/sd/releases/download/{{ sd_release.json.tag_name }}/sd-{{ sd_release.json.tag_name }}-{{ sd_target | trim }}.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        extra_opts:
          - --strip-components=1
          - --wildcards
          - "*/sd"
        mode: '0755'

  rescue:
    - name: Record that sd did not install
      # noqa: var-naming[no-role-prefix] -- deploy_warnings is deliberately not
      # role-prefixed: it is the shared accumulator playbooks/main.yml reports
      # from. See docs/resilient-deploy.md.
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['sd: ' ~ (ansible_failed_result.msg | default('download failed'))] }}

  when: ansible_facts['distribution'] == 'Fedora'

# lazygit - git TUI. Not in the Ubuntu apt repos, and not in the default Fedora
# set, so install the GitHub release binary on both Linux distros (macOS gets it
# from brew above). Asset is lazygit_<ver>_linux_<arch>.tar.gz with the binary
# at the archive root; the tag carries a leading v the filename drops, and the
# arch token is x86_64/arm64 (cf. dive's v-strip, act's arch mix).
- name: Install lazygit (Linux binary)
  block:
    - name: Get latest lazygit version
      ansible.builtin.uri:
        url: https://api.github.com/repos/jesseduffield/lazygit/releases/latest
        return_content: true
      register: lazygit_release
      check_mode: false

    - name: Set the lazygit asset facts
      ansible.builtin.set_fact:
        lazygit_version: "{{ lazygit_release.json.tag_name | regex_replace('^v', '') }}"
        lazygit_arch: "{{ 'arm64' if hyperi_arch_deb == 'arm64' else 'x86_64' }}"
        lazygit_base: https://github.com/jesseduffield/lazygit/releases/download

    - name: Download and extract lazygit
      ansible.builtin.unarchive:
        src: "{{ lazygit_base }}/{{ lazygit_release.json.tag_name }}/lazygit_{{ lazygit_version }}_linux_{{ lazygit_arch }}.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        include: lazygit
        mode: '0755'
      when: not ansible_check_mode

  rescue:
    - name: Record that lazygit did not install
      # noqa: var-naming[no-role-prefix] -- deploy_warnings is the shared
      # accumulator playbooks/main.yml reports from. See docs/resilient-deploy.md.
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['lazygit: ' ~ (ansible_failed_result.msg | default('download failed'))] }}

  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# GUI UTILITIES (requires GNOME desktop)
# ============================================================================

- name: Install GUI utilities
  when: has_gnome | default(false)
  block:
    # Flatpak (needed for GUI apps)
    - name: Install Flatpak (Ubuntu)
      ansible.builtin.apt:
        name: flatpak
        state: present
      when: ansible_facts['distribution'] == 'Ubuntu'

    - name: Install Flatpak (Fedora)
      ansible.builtin.dnf:
        name: flatpak
        state: present
      when: ansible_facts['distribution'] == 'Fedora'

    - name: Add Flathub repository (system-wide)
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo
        method: system
      when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# Hyperi ADMIN TOOLS
# ============================================================================

# HyperI fleet/admin scripts -- OPT-IN (`never`), not part of the generic base.
# add-dev-user creates a passwordless-sudo user (a footgun sitting in a
# stranger's PATH), and these are fleet/VM tooling, not general dev utilities.
# Run explicitly with `--tags admin-scripts`; HyperI machines select them.
- name: Install HyperI admin scripts (opt-in)
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    # Explicit-request / soe only -- a NOPASSWD-sudo user is a footgun that must
    # never ride in on a persona meta-role's propagated tag. See removals in
    # developer/tasks/main.yml for the same ansible_run_tags gate.
    - "'admin-scripts' in ansible_run_tags or 'soe' in ansible_run_tags"
  # `soe` so HyperI machines get them; `never` so the generic base does not.
  # (removals/update_command get `soe` automatically via the soe->developer meta
  # dependency, but this block is nested in utilities.yml, so it needs it here.)
  tags: ['admin-scripts', 'soe', 'never']
  block:
    - name: Ensure /usr/local/sbin exists
      ansible.builtin.file:
        path: /usr/local/sbin
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Install add-dev-user script
      ansible.builtin.copy:
        src: add-dev-user
        dest: /usr/local/sbin/add-dev-user
        owner: root
        group: root
        mode: '0755'

    - name: Install rename-user script
      ansible.builtin.copy:
        src: rename-user
        dest: /usr/local/sbin/rename-user
        owner: root
        group: root
        mode: '0755'

    - name: Install desktop-mode script
      ansible.builtin.copy:
        src: desktop-mode
        dest: /usr/local/sbin/desktop-mode
        owner: root
        group: root
        mode: '0755'
