---
# Tombstones — things this project used to install and no longer does.
#
# WHY THIS FILE EXISTS
# Ansible is convergent, not declarative-with-pruning. It enforces what you
# DECLARE and has no concept of "this used to be declared, so remove it".
# Puppet has `purge`; OpenTofu can do it because it keeps state; Ansible has
# neither. So deleting an install task leaves the tool on every existing host
# forever. The only way to express "should not exist" is to say so.
#
# WHY NOT A PURGE
# `package_facts` could enumerate everything installed and remove whatever we
# do not declare. We deliberately do not: on a developer workstation
# UNDECLARED STATE IS THE POINT — people install their own tools, and a purge
# would delete their work. This is a denylist of what WE removed, never an
# allowlist of what is permitted.
#
# RULES FOR ADDING HERE
#   - When you drop an install, ADD the removal. Same commit.
#   - Say WHY it was dropped, so a future reader can retire the tombstone.
#   - Never fail the run: a host that never had the thing is the common case.
#   - Removals are the destructive part of this playbook. Preview with
#     --check --diff.
#
# RETIRING TOMBSTONES
# Once no host in the field is old enough to carry an artefact, delete its
# tombstone. Track that by the version stamp, not by memory.

# ============================================================================
# SHADOWING — a stale user-level copy that wins on PATH over the system one.
# The worst class: the host LOOKS fine (the command runs, plausible version)
# but no system update will ever touch that copy again.
# ============================================================================

# uv is now repo-installed (dnf on Fedora, brew on macOS) or user-owned in
# ~/.local/bin (Ubuntu). Older versions of this project dropped a root-owned
# binary in /usr/local/bin and/or a per-user copy in ~/.cargo/bin. Either will
# win on PATH over the new install and NOTHING will ever update it.
#
# This is not hypothetical: verified on a real long-lived host 2026-07-17 --
# /usr/local/bin/uv was 0.10.2, root-owned, dated Feb 11, while current is
# 0.11.29. Five months stale, and `which uv` resolved to it, so the host
# looked fine.
# uv AND its uvx sibling both land in /usr/local/bin (verified on desktop-derek:
# both root-owned, dated Feb 11, five months stale) -- remove the pair.
- name: Remove the retired root-owned uv/uvx binaries (no update path; shadow the repo install)
  ansible.builtin.file:
    path: "/usr/local/bin/{{ item }}"
    state: absent
  loop:
    - uv
    - uvx
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Remove the retired user-level uv/uvx (superseded by the repo install)
  ansible.builtin.file:
    path: "{{ user_home }}/.cargo/bin/{{ item }}"
    state: absent
  loop:
    - uv
    - uvx
  become: false
  when: ansible_facts['distribution'] in ['Fedora', 'MacOSX']

# ============================================================================
# CANNOT CO-EXIST — the old thing actively conflicts with its replacement.
# ============================================================================

# OrbStack: free tier is personal, non-commercial use only; business use needs
# a paid seat. Replaced by colima (MIT, free commercial). Both register a
# docker context + socket, so leaving it makes `docker`'s target ambiguous.
# NOTE: uninstalling OrbStack also removes the docker CLI it provided — the
# docker role reinstalls the CLI from brew, so ordering matters.
- name: Remove OrbStack (paid for commercial use; replaced by colima)
  community.general.homebrew_cask:
    name: orbstack
    state: absent
  become: false
  environment: "{{ homebrew_cask_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'
  failed_when: false

- name: Remove the stale OrbStack docker context
  ansible.builtin.command:
    cmd: docker context rm orbstack
  become: false
  register: developer_rm_orbstack_ctx
  changed_when: "'orbstack' in (developer_rm_orbstack_ctx.stdout | default(''))"
  failed_when: false
  when: ansible_facts['distribution'] == 'MacOSX'

# ============================================================================
# RETIRED BY DECISION — dropped from the default install.
# ============================================================================

# Docker Desktop — dropped by decision; on Linux we install Docker Engine (CE)
# from Docker's own repo, and on macOS the CLI only. Declared EXPLICITLY rather
# than left to fall out of a dependency cascade.
#
# Verified on a real long-lived host 2026-07-17: docker-desktop 4.69.0 was
# still installed at /opt/docker-desktop (inactive) months after we stopped
# installing it -- Ansible cannot prune what it stops declaring.
#
# Removing it also takes `pass` and golang-docker-credential-helpers, which are
# ONLY present as its credential-store dependency (verified: no
# ~/.password-store, no credsStore in ~/.docker/config.json). That cascade is
# intended. If a host DOES use `pass` for real, apt keeps it — it only removes
# what nothing else needs.
- name: Remove Docker Desktop (Ubuntu - dropped by decision; Engine/CLI replace it)
  ansible.builtin.apt:
    name: docker-desktop
    state: absent
    autoremove: true
  when: ansible_facts['distribution'] == 'Ubuntu'
  failed_when: false

- name: Remove Docker Desktop (Fedora - dropped by decision; Engine/CLI replace it)
  ansible.builtin.dnf:
    name: docker-desktop
    state: absent
    autoremove: true
  when: ansible_facts['distribution'] == 'Fedora'
  failed_when: false

# macOS: the Docker Desktop cask is `docker`; the CLI-only install is the brew
# FORMULA `docker` (see docker.yml), a different artefact, so removing the cask
# leaves the CLI intact.
- name: Remove Docker Desktop (macOS - dropped by decision; CLI-only replaces it)
  community.general.homebrew_cask:
    name: docker
    state: absent
  become: false
  environment: "{{ homebrew_cask_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'
  failed_when: false

# OnlyOffice - retired; LibreOffice is the org office suite now. Remove the
# native package and the Flatpak fallback from hosts that carried it.
- name: Remove OnlyOffice desktop editors (Fedora)
  ansible.builtin.dnf:
    name: onlyoffice-desktopeditors
    state: absent
    autoremove: true
  when: ansible_facts['distribution'] == 'Fedora'
  failed_when: false

- name: Remove OnlyOffice desktop editors (Ubuntu)
  ansible.builtin.apt:
    name: onlyoffice-desktopeditors
    state: absent
    purge: false
    autoremove: false
  when: ansible_facts['distribution'] == 'Ubuntu'
  failed_when: false

- name: Remove OnlyOffice Flatpak
  community.general.flatpak:
    name: org.onlyoffice.desktopeditors
    state: absent
    method: system
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
  failed_when: false

# Lens / Freelens (Kubernetes desktop GUIs) - retired; no k8s desktop GUI ships
# now (k9s covers it). Verified on desktop-derek: Freelens present as the
# app.freelens.Freelens flatpak. Remove every form a host might carry.
- name: Remove Freelens (Ubuntu apt)
  ansible.builtin.apt:
    name: freelens
    state: absent
    purge: false
  when: ansible_facts['distribution'] == 'Ubuntu'
  failed_when: false

- name: Remove Freelens (Fedora dnf)
  ansible.builtin.dnf:
    name: freelens
    state: absent
  when: ansible_facts['distribution'] == 'Fedora'
  failed_when: false

- name: Remove retired k8s desktop GUI flatpaks (Freelens, OpenLens)
  community.general.flatpak:
    name: "{{ item }}"
    state: absent
    method: system
  loop:
    - app.freelens.Freelens
    - dev.k8slens.OpenLens
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
  failed_when: false

- name: Remove OpenLens (macOS cask - retired)
  community.general.homebrew_cask:
    name: openlens
    state: absent
  become: false
  environment: "{{ homebrew_cask_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'
  failed_when: false

# Binaries older versions dropped in /usr/local/bin and no longer install.
# All root-owned with no update path, so they linger indefinitely.
# Verified still present on a real long-lived host 2026-07-17: bw, linear.
#   minikube  — superseded by kind (vanilla kubeadm k8s in docker, closer to
#               the real clusters our helm/argocd work targets)
#   bw        — Bitwarden CLI, removed by decision (741e4b2)
#   linear    — Linear CLI, removed by decision 2026-05-01
#   jfrog     — removed by decision 2026-05-01
#   netbird   — removed by decision 2026-05-01
- name: Remove retired /usr/local/bin binaries
  ansible.builtin.file:
    path: "/usr/local/bin/{{ item }}"
    state: absent
  loop:
    - minikube
    - bw
    - linear
    - jfrog
    - netbird
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# RETIRED CLI UTILITIES
# ============================================================================
# Dropped from utilities.yml by decision. Removing them from the install list
# does nothing on its own -- Ansible cannot prune what we stop declaring, so
# every host we have ever built keeps them until told.
#
#   telnet, nmap        no business on a default developer box
#   net-tools           superseded by iproute2 (ss, ip) for ~15 years
#   traceroute, whois   niche; install them when you need them
#   tree                superseded by eza/fd. NOT standalone: `pass` depends on
#                       it and docker-desktop depends on `pass`, so removing
#                       tree cascades to both (fine here -- both are going
#                       anyway; it is why removals are dry-run against a real
#                       host first).
#   httpie              superseded by curl for our uses
#
# NOT purged, only removed: `purge` would also delete config a developer may
# have written themselves.
- name: Remove retired CLI utilities (Fedora)
  ansible.builtin.dnf:
    name:
      - telnet
      - net-tools
      - traceroute
      - nmap
      - whois
      - tree
      - httpie
    state: absent
  when: ansible_facts['distribution'] == 'Fedora'
  failed_when: false

- name: Remove retired CLI utilities (Ubuntu)
  ansible.builtin.apt:
    name:
      - telnet
      - net-tools
      - traceroute
      - nmap
      - whois
      - tree
      - httpie
    state: absent
    purge: false
    autoremove: false
  when: ansible_facts['distribution'] == 'Ubuntu'
  failed_when: false

# macOS is deliberately absent. These came from brew, and `brew uninstall` on a
# Mac hits tools the developer may well have installed themselves for their own
# reasons -- on a personal machine, undeclared state is theirs, not ours. The
# Linux boxes are provisioned fleet machines; a Mac is somebody's laptop.

# ============================================================================
# STALE CONFIG — blocks and repo files older versions wrote.
# ============================================================================

# gnu-tools is retired, so its PATH shim now prepends directories for packages
# we no longer install. blockinfile removes it cleanly via the same marker it
# was written with.
- name: Remove the retired GNU tools PATH shim from ~/.zprofile
  ansible.builtin.blockinfile:
    path: "{{ user_home }}/.zprofile"
    marker: "# {mark} HYPERI: GNU tools PATH shim"
    state: absent
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'
  failed_when: false
