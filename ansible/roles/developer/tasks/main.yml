---
# Developer Environment - Main Tasks

- name: Initialize - Setup common variables
  ansible.builtin.include_tasks:
    file: init.yml
  tags: ['always']

- name: Ensure desktop environment is installed
  ansible.builtin.include_tasks:
    file: desktop.yml
    apply:
      tags: ['desktop']
  tags: ['desktop']
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# Re-detect GNOME after desktop.yml installs it
# This is critical for Packer headless builds where GNOME wasn't installed at init.yml time
- name: Re-check if GNOME Shell is now installed (after desktop.yml)
  ansible.builtin.stat:
    path: /usr/bin/gnome-shell
  register: gnome_shell_post_desktop
  when: ansible_facts['distribution'] != 'MacOSX'
  tags: ['desktop']

- name: Update GNOME availability fact after desktop installation
  ansible.builtin.set_fact:
    has_gnome: "{{ gnome_shell_post_desktop.stat.exists | default(false) }}"
  when:
    - ansible_facts['distribution'] != 'MacOSX'
    - gnome_shell_post_desktop is defined
  tags: ['desktop']

- name: Display updated GNOME status
  ansible.builtin.debug:
    msg: "GNOME desktop (post-install check): {{ 'Installed' if has_gnome else 'Not installed' }}"
  tags: ['desktop']

# Install psutil for dconf module (required for GNOME settings tasks)
# This needs to run after GNOME is detected/installed, not in init.yml
- name: Install psutil for dconf module (Fedora - post desktop install)
  ansible.builtin.dnf:
    name: python3-psutil
    state: present
  when:
    - ansible_facts['distribution'] == 'Fedora'
    - has_gnome | default(false)
  tags: ['desktop']

- name: Install psutil for dconf module (Ubuntu - post desktop install)
  ansible.builtin.apt:
    name: python3-psutil
    state: present
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - has_gnome | default(false)
  tags: ['desktop']

- name: Install Nemo file manager (replaces Nautilus as default)
  ansible.builtin.include_tasks:
    file: nemo.yml
    apply:
      tags: ['nemo', 'desktop']
  tags: ['nemo', 'desktop']
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome | default(false)

# Fix AppArmor user namespace restriction (Ubuntu 24.04+)
# This allows Chromium-based apps (Chrome, Brave, VSCode, Electron) to work
# Uses global sysctl: kernel.apparmor_restrict_unprivileged_userns = 0
- name: Fix AppArmor user namespace restriction for desktop apps
  ansible.builtin.include_tasks:
    file: apparmor_userns.yml
    apply:
      tags: ['security', 'apparmor']
  tags: ['security', 'apparmor']
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Configure OS repositories (mirrors, performance)
  ansible.builtin.include_tasks:
    file: repository.yml
    apply:
      tags: ['repository']
  tags: ['repository']

- name: Configure security (automatic updates)
  ansible.builtin.include_tasks:
    file: security.yml
    apply:
      tags: ['security']
  tags: ['security']

- name: Install Docker
  ansible.builtin.include_tasks:
    file: docker.yml
    apply:
      tags: ['docker']
  tags: ['docker']

- name: Install development utilities
  ansible.builtin.include_tasks:
    file: utilities.yml
    apply:
      tags: ['utilities']
  tags: ['utilities']

- name: Install Python development tools
  ansible.builtin.include_tasks:
    file: uv.yml
    apply:
      tags: ['python']
  tags: ['python']

- name: Install Git and version control tools
  ansible.builtin.include_tasks:
    file: git.yml
    apply:
      tags: ['git']
  tags: ['git']

- name: Install cloud tools
  ansible.builtin.include_tasks:
    file: cloud.yml
    apply:
      tags: ['cloud']
  tags: ['cloud']

- name: Install Azure CLI
  ansible.builtin.include_tasks:
    file: azure.yml
  tags: ['azure', 'cloud']

- name: Install Google Cloud CLI
  ansible.builtin.include_tasks:
    file: gcloud.yml
  tags: ['gcloud', 'cloud']

- name: Install data platform tools
  ansible.builtin.include_tasks:
    file: data_tools.yml
    apply:
      tags: ['data']
  tags: ['data']

- name: Install C development tools
  ansible.builtin.include_tasks:
    file: c_tools.yml
  tags: ['c_tools', 'dev']

- name: Install Node.js and semantic-release
  ansible.builtin.include_tasks:
    file: nodejs.yml
  tags: ['nodejs']

- name: Install OnlyOffice Desktop Editors
  ansible.builtin.include_tasks:
    file: onlyoffice.yml
    apply:
      tags: ['onlyoffice']
  tags: ['onlyoffice']
  when:
    - has_gnome | default(false)
    - install_onlyoffice | default(true)

- name: Install VS Code
  ansible.builtin.include_tasks:
    file: vscode.yml
    apply:
      tags: ['vscode']
  tags: ['vscode']
  when: has_gnome | default(false)

- name: Install Google Chrome
  ansible.builtin.include_tasks:
    file: chrome.yml
    apply:
      tags: ['chrome']
  tags: ['chrome']
  when: has_gnome | default(false)

- name: Install Brave Browser
  ansible.builtin.include_tasks:
    file: brave.yml
    apply:
      tags: ['brave']
  tags: ['brave']
  when:
    - has_gnome | default(false)
    - install_brave | default(true)

- name: Install Bitwarden
  ansible.builtin.include_tasks:
    file: bitwarden.yml
  when: install_bitwarden | default(true)
  tags: ['bitwarden']

- name: Install Claude Code CLI
  ansible.builtin.include_tasks:
    file: claude.yml
  tags: ['claude']

- name: Install Gitleaks
  ansible.builtin.include_tasks:
    file: gitleaks.yml
  tags: ['gitleaks']

- name: Install act (local GitHub Actions)
  ansible.builtin.include_tasks:
    file: act.yml
  tags: ['act', 'ci']

- name: Disable telemetry and advertising
  ansible.builtin.include_tasks:
    file: telemetry.yml
  tags: ['telemetry']

- name: Apply GNOME configuration (winlike or maclike)
  ansible.builtin.include_tasks:
    file: gnome.yml
    apply:
      tags: ['winlike', 'maclike', 'never']
  tags: ['winlike', 'maclike', 'never']
  when:
    - has_gnome | default(false)
    - ansible_facts['distribution'] in ['Ubuntu', 'Fedora']

- name: Apply regional settings (locale, formats, spell-check)
  ansible.builtin.include_tasks:
    file: region.yml
    apply:
      tags: ['region']
  tags: ['region']
  when:
    - desktop_region | default('') | length > 0
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Install Ghostty terminal
  ansible.builtin.include_tasks:
    file: ghostty.yml
    apply:
      tags: ['ghostty']
  tags: ['ghostty']
  when: has_gnome | default(false)

- name: Configure shell (bash history auto-commit)
  ansible.builtin.include_tasks:
    file: shell_config.yml
    apply:
      tags: ['shell']
  tags: ['shell']

- name: Verify base tools installation
  ansible.builtin.include_tasks:
    file: verify.yml
    apply:
      tags: ['verify']
  tags: ['verify']
