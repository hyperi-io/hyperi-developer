---
# Developer Role — Generic CLI dev base (anyone)
# Lightweight, low disruption to existing environment. No HyperI-specific
# opinions. GUI tooling lives in developer-gui; languages in developer-<lang>;
# IaC in infrastructure; org-specific in soe / soe-gui.

- name: Initialize - Setup common variables
  ansible.builtin.include_tasks:
    file: init.yml
  tags: ['always']

# Fix AppArmor user namespace restriction (Ubuntu 23.10+)
# Generic Ubuntu bug fix — breaks Flatpak GUI apps for everyone, not opinionated.
- name: Fix AppArmor user namespace restriction
  ansible.builtin.include_tasks:
    file: apparmor_userns.yml
    apply:
      tags: ['developer', 'apparmor']
  tags: ['developer', 'apparmor']
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Configure OS repositories (mirrors, fastestmirror)
  ansible.builtin.include_tasks:
    file: repository.yml
    apply:
      tags: ['developer', 'repository']
  tags: ['developer', 'repository']

# Tombstones (removing retired tools) are OPT-IN (`never`), not part of the base
# run. Deleting a person's tools is a HyperI-fleet action -- the generic
# `developer` base is designed to be additive and leave a stranger's machine
# alone, not uninstall their nmap/whois/pass/uv. Run them explicitly with
# `--tags removals` (HyperI fleet machines do).
- name: Remove retired tools (tombstones) (opt-in)
  ansible.builtin.include_tasks:
    file: removals.yml
    apply:
      tags: ['removals', 'soe', 'never']
  tags: ['removals', 'soe', 'never']
  # Fire ONLY when explicitly asked for (--tags removals) or on a soe run. A
  # persona meta-role that pulls the developer base propagates its own tag onto
  # every base task, which would otherwise drag this destructive tombstone in;
  # gating on ansible_run_tags (what the user actually requested) blocks that and
  # also makes a raw `--tags developer` safe.
  when: "'removals' in ansible_run_tags or 'soe' in ansible_run_tags"

- name: Install Docker
  ansible.builtin.include_tasks:
    file: docker.yml
    apply:
      tags: ['developer', 'docker']
  tags: ['developer', 'docker']

- name: Install development utilities
  ansible.builtin.include_tasks:
    file: utilities.yml
    apply:
      tags: ['developer', 'utilities']
  tags: ['developer', 'utilities']

- name: Install Git and version control tools
  ansible.builtin.include_tasks:
    file: git.yml
    apply:
      tags: ['developer', 'git']
  tags: ['developer', 'git']

- name: Apply regional settings (locale, formats, spell-check)
  ansible.builtin.include_tasks:
    file: region.yml
    apply:
      tags: ['developer', 'region']
  tags: ['developer', 'region']
  when:
    - desktop_region | default('') | length > 0
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# Opt-in per-app tasks — gated with 'never' so default --tags developer skips
# them. Run explicitly via --tags chrome / --tags brave / --tags avatar.
# ============================================================================

# Chrome and Brave are cross-platform: has_gnome is always false on macOS, so
# gating on it alone made the Homebrew cask tasks in chrome.yml / brave.yml
# unreachable there. Gate on "a Linux desktop OR macOS" instead.
- name: Install Google Chrome (opt-in)
  ansible.builtin.include_tasks:
    file: chrome.yml
    apply:
      tags: ['chrome', 'never']
  tags: ['chrome', 'never']
  when:
    - (has_gnome | default(false)) or ansible_facts['distribution'] == 'MacOSX'
    - "'chrome' in ansible_run_tags or 'soe' in ansible_run_tags"

- name: Install Brave Browser (opt-in)
  ansible.builtin.include_tasks:
    file: brave.yml
    apply:
      tags: ['brave', 'never']
  tags: ['brave', 'never']
  when:
    - (has_gnome | default(false)) or ansible_facts['distribution'] == 'MacOSX'
    - "'brave' in ansible_run_tags or 'soe' in ansible_run_tags"

- name: Deploy user avatar (opt-in)
  ansible.builtin.include_tasks:
    file: avatar.yml
    apply:
      tags: ['avatar', 'never']
  tags: ['avatar', 'never']
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome | default(false)
    - "'avatar' in ansible_run_tags or 'soe' in ansible_run_tags"

# One-command "update everything" tool + clickable GUI app. Opt-in (`never`):
# it installs a HyperI-branded "Hyperi Update" launcher, which is org furniture,
# not something the generic base drops on a stranger's app grid. Run explicitly
# with `--tags update_command`; the soe role selects it for HyperI machines.
- name: Install hyperi-update command and GUI launcher (opt-in)
  ansible.builtin.include_tasks:
    file: update_command.yml
    apply:
      tags: ['update_command', 'soe', 'never']
  tags: ['update_command', 'soe', 'never']
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu', 'MacOSX']
    - "'update_command' in ansible_run_tags or 'soe' in ansible_run_tags"

- name: Verify base tools installation
  ansible.builtin.include_tasks:
    file: verify.yml
    apply:
      tags: ['developer', 'verify']
  tags: ['developer', 'verify']
  # Verify probes for installed binaries; in --check nothing has been
  # installed yet, so the probes would fail a dry run that is otherwise fine.
  when: not ansible_check_mode
