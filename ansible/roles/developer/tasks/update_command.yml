---
# One-command "update everything" tool + clickable GUI launcher.
# Command: hyperi-update   (GUI: "Hyperi Update")
#
# Linux (Ubuntu AND Fedora) + macOS. Fedora used to be excluded, which quietly
# holed the whole auto-update strategy: every packaging decision in this repo
# leans on "it rides the normal update path", and on Fedora there was no path
# to ride. The script now drives dnf as well as apt.

# ============================================================================
# LINUX (Ubuntu + Fedora)
# ============================================================================
- name: Install hyperi-update command (Linux)
  ansible.builtin.copy:
    src: update/hyperi-update-linux.sh
    dest: /usr/local/bin/hyperi-update
    mode: '0755'
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# The GUI launcher is only useful with a desktop. A headless box (Packer build,
# container, server) gets the command and nothing else.
- name: Install hyperi-update app icon (Linux)
  ansible.builtin.copy:
    src: update/hyperi-update.svg
    dest: /usr/share/icons/hicolor/scalable/apps/hyperi-update.svg
    mode: '0644'
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome | default(false)

- name: Install hyperi-update desktop launcher (Linux)
  ansible.builtin.copy:
    src: update/hyperi-update.desktop
    dest: /usr/share/applications/hyperi-update.desktop
    mode: '0644'
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome | default(false)

- name: Refresh icon cache (Linux)
  ansible.builtin.command: gtk-update-icon-cache -f -t /usr/share/icons/hicolor
  changed_when: false
  failed_when: false
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome | default(false)

- name: Refresh desktop database (Linux)
  ansible.builtin.command: update-desktop-database /usr/share/applications
  changed_when: false
  failed_when: false
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome | default(false)

# ============================================================================
# macOS
# ============================================================================
- name: Install hyperi-update command (macOS)
  ansible.builtin.copy:
    src: update/hyperi-update-macos.sh
    dest: /usr/local/bin/hyperi-update
    mode: '0755'
  become: true
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Create hyperi-update icon directory (macOS)
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/hyperi-update"
    state: directory
    mode: '0755'
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Install hyperi-update app icon (macOS)
  ansible.builtin.copy:
    src: update/AppIcon.icns
    dest: "{{ user_home }}/.local/share/hyperi-update/AppIcon.icns"
    mode: '0644'
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Build clickable "Hyperi Update" app (macOS)
  ansible.builtin.command:
    cmd: /usr/local/bin/hyperi-update --install
  become: false
  changed_when: true
  failed_when: false
  when: ansible_facts['distribution'] == 'MacOSX'

# ============================================================================
# STATUS
# ============================================================================
- name: Display hyperi-update install status
  ansible.builtin.debug:
    msg: >-
      Installed 'hyperi-update' to /usr/local/bin.
      {{ "GUI app 'Hyperi Update' created in /Applications."
         if ansible_facts['distribution'] == 'MacOSX'
         else ("GUI app 'Hyperi Update' available in the app grid."
               if has_gnome | default(false)
               else "No desktop detected -- command only.") }}
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu', 'MacOSX']
