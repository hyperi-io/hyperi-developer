---
# Corporate-GUI Role — Org-specific GUI apps (opt-in).
# Slack, OnlyOffice, the HyperI desktop opinions (Nemo replacing Nautilus,
# GNOME extensions, desktop cleanup).

- name: Install Nemo file manager (replaces Nautilus)
  ansible.builtin.include_tasks:
    file: nemo.yml
    apply:
      tags: ['soe-gui', 'nemo']
  tags: ['soe-gui', 'nemo']
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome | default(false)

- name: Hide duplicate apps and clean desktop
  ansible.builtin.include_tasks:
    file: desktop_cleanup.yml
    apply:
      tags: ['soe-gui', 'desktop-cleanup']
  tags: ['soe-gui', 'desktop-cleanup']
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome | default(false)

# The GNOME desktop (extensions, dock, theming) is opt-in: it must only be
# configured when winlike or maclike is EXPLICITLY requested. A `never` tag
# alone cannot enforce that here, because the role-level tags are inherited by
# every task and override `never` whenever the role runs at all. So gate on
# ansible_run_tags (what the user actually asked for) instead. Also do NOT use
# `apply: tags:` here - with include_tasks it unions the tags onto every inner
# task and breaks the winlike/maclike discrimination that gnome.yml relies on.
- name: Install GNOME extensions and apply UI mode (winlike or maclike)
  ansible.builtin.include_tasks:
    file: gnome.yml
  tags: ['soe-gui', 'gnome-extensions', 'winlike', 'maclike', 'never']
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome | default(false)
    - "'winlike' in ansible_run_tags or 'maclike' in ansible_run_tags"

- name: Install Slack
  ansible.builtin.include_tasks:
    file: slack.yml
    apply:
      tags: ['soe-gui', 'slack']
  tags: ['soe-gui', 'slack']
  when: has_gnome | default(false) or ansible_facts['distribution'] == 'MacOSX'

- name: Install OnlyOffice Desktop Editors
  ansible.builtin.include_tasks:
    file: onlyoffice.yml
    apply:
      tags: ['soe-gui', 'onlyoffice']
  tags: ['soe-gui', 'onlyoffice']
  when: has_gnome | default(false) or ansible_facts['distribution'] == 'MacOSX'

- name: Install office suite tasks
  ansible.builtin.include_tasks:
    file: office.yml
    apply:
      tags: ['soe-gui', 'office']
  tags: ['soe-gui', 'office']
  when: has_gnome | default(false) or ansible_facts['distribution'] == 'MacOSX'
