---
# LibreOffice - the HyperI org office suite (Linux desktop only; macOS uses the
# native Pages/Numbers/Keynote). Distro packages, so it auto-updates with the
# host. OnlyOffice is retired (tombstoned in developer/tasks/removals.yml).

- name: Install LibreOffice (Fedora)
  ansible.builtin.dnf:
    name: '@libreoffice'
    state: present
  when: ansible_facts['distribution'] == 'Fedora'

- name: Install LibreOffice (Ubuntu)
  ansible.builtin.apt:
    name: libreoffice
    state: present
  when: ansible_facts['distribution'] == 'Ubuntu'

# Make LibreOffice the default handler per document family (writer/calc/impress).
- name: Set LibreOffice as default for office documents
  ansible.builtin.command:
    cmd: "xdg-mime default {{ item.app }} {{ item.mime }}"
  loop:
    # Word processing -> Writer
    - { app: 'libreoffice-writer.desktop', mime: 'application/msword' }
    - { app: 'libreoffice-writer.desktop', mime: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' }
    - { app: 'libreoffice-writer.desktop', mime: 'application/vnd.oasis.opendocument.text' }
    # Spreadsheets -> Calc
    - { app: 'libreoffice-calc.desktop', mime: 'application/vnd.ms-excel' }
    - { app: 'libreoffice-calc.desktop', mime: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }
    - { app: 'libreoffice-calc.desktop', mime: 'application/vnd.oasis.opendocument.spreadsheet' }
    # Presentations -> Impress
    - { app: 'libreoffice-impress.desktop', mime: 'application/vnd.ms-powerpoint' }
    - { app: 'libreoffice-impress.desktop', mime: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' }
    - { app: 'libreoffice-impress.desktop', mime: 'application/vnd.oasis.opendocument.presentation' }
  become: true
  become_user: "{{ actual_user }}"
  # xdg-mime default is quiet and idempotent, so we cannot detect a real change
  # from its output; report unchanged rather than always-changed. failed_when is
  # false because a missing mime association is cosmetic, not run-fatal.
  changed_when: false
  failed_when: false
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - has_gnome | default(false)
