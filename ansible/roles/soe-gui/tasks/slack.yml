---
# Slack installation
# Linux: official packagecloud native repo (apt on Ubuntu, yum/dnf on Fedora)
# macOS: Homebrew cask

# ============================================================================
# UBUNTU - official packagecloud APT repository
# ============================================================================
- name: Install Slack (Ubuntu)
  block:
    - name: Create apt keyrings directory (Slack)
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Slack signing key
      ansible.builtin.get_url:
        url: https://packagecloud.io/slacktechnologies/slack/gpgkey
        dest: /etc/apt/keyrings/slack.asc
        mode: '0644'

    - name: Add Slack apt repository
      ansible.builtin.deb822_repository:
        name: slack
        types: deb
        uris: https://packagecloud.io/slacktechnologies/slack/debian/
        suites: jessie
        components: main
        signed_by: /etc/apt/keyrings/slack.asc
        state: present

    - name: Install Slack desktop
      ansible.builtin.apt:
        name: slack-desktop
        state: present
        update_cache: true
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - has_gnome | default(false)

# ============================================================================
# FEDORA - official packagecloud RPM repository
# ============================================================================
- name: Install Slack (Fedora)
  block:
    - name: Add Slack rpm repository
      ansible.builtin.yum_repository:
        name: slack
        description: Slack
        baseurl: https://packagecloud.io/slacktechnologies/slack/fedora/21/$basearch
        gpgcheck: true
        gpgkey: https://packagecloud.io/slacktechnologies/slack/gpgkey
        enabled: true

    - name: Install Slack
      ansible.builtin.dnf:
        name: slack
        state: present
  when:
    - ansible_facts['distribution'] == 'Fedora'
    - has_gnome | default(false)

# ============================================================================
# macOS - Homebrew cask
# ============================================================================
- name: Install Slack via Homebrew Cask (macOS)
  community.general.homebrew_cask:
    name: slack
    state: present
  become: false
  environment: "{{ homebrew_cask_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'
