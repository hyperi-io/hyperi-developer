---
# soe-gui depends on the astral suite -- gnome.yml installs gnome-extensions-cli
# (gext), which is a uv tool, so uv must exist before the extension tasks run.
# A meta dependency cannot rot the way the old include_tasks: uv.yml did.

dependencies:
  - role: astral
  # Desktop RDP client (Remmina/Thincast) is a GUI org tool -- soe-gui staff get
  # it by default; anyone else can take it standalone with `--tags rdp-client`.
  - role: rdp-client
