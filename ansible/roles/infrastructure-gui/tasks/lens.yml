---
# Lens — K8s desktop client (https://k8slens.dev/).

- name: Install Lens via Flatpak (Linux)
  community.general.flatpak:
    name: dev.k8slens.OpenLens
    state: present
    method: system
  become: true
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Install Lens via Homebrew cask (macOS)
  community.general.homebrew_cask:
    name: lens
    state: present
  become: false
  environment: "{{ homebrew_cask_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'
