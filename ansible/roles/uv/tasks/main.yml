---
# uv — Astral's Python package/venv/interpreter manager.
#
# INSTALL POLICY: system-wide from a repo wherever one exists, so uv rides a
# normal system update (`hyperi-update`, or a plain dnf/brew upgrade) instead
# of rotting at whatever version was current on install day.
#
#   Fedora : dnf   — uv is in the MAIN repo
#   macOS  : brew  — uv is a core formula
#   Ubuntu : no apt package, and Astral publish no apt repo, so fall back to the
#            upstream tarball. Kept USER-owned (~/.local/bin) rather than
#            dropped in /usr/local/bin: a root-owned binary with no update path
#            is nobody's job to maintain, whereas hyperi-update already
#            refreshes user-owned uv. Not curl-pipe-sh — we fetch and unpack a
#            vetted tarball.

- name: Install uv (Fedora)
  ansible.builtin.dnf:
    name: uv
    state: present
  when: ansible_facts['distribution'] == 'Fedora'

- name: Install uv (macOS)
  community.general.homebrew:
    name: uv
    state: present
  become: false
  environment: "{{ homebrew_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'

# ============================================================================
# Ubuntu — upstream tarball, user-owned
# ============================================================================

- name: Install uv from the upstream release (Ubuntu)
  when: ansible_facts['distribution'] == 'Ubuntu'
  block:
    - name: Get latest uv version from GitHub API
      ansible.builtin.uri:
        url: https://api.github.com/repos/astral-sh/uv/releases/latest
        return_content: true
      register: uv_latest_release
      check_mode: false

    - name: Set uv version fact
      ansible.builtin.set_fact:
        uv_version: "{{ uv_latest_release.json.tag_name }}"

    # uv names its assets with the full GNU triple. Unlike sd, uv publishes a
    # gnu build for BOTH arches, so the libc token does not move.
    # The unsupported-arch check now lives in playbooks/main.yml pre_tasks --
    # one gate for the whole run rather than a copy per tool.
    - name: Determine uv binary architecture
      ansible.builtin.set_fact:
        uv_arch: "{{ hyperi_arch_gnu }}-unknown-linux-gnu"

    - name: Create the user-local bin directory
      ansible.builtin.file:
        path: "{{ user_home }}/.local/bin"
        state: directory
        mode: '0755'
        owner: "{{ actual_user }}"
        group: "{{ actual_user }}"

    - name: Download uv tarball
      ansible.builtin.get_url:
        url: "https://github.com/astral-sh/uv/releases/download/{{ uv_version }}/uv-{{ uv_arch }}.tar.gz"
        dest: "/tmp/uv-{{ uv_arch }}.tar.gz"
        mode: '0644'

    - name: Extract uv
      ansible.builtin.unarchive:
        src: "/tmp/uv-{{ uv_arch }}.tar.gz"
        dest: "{{ user_home }}/.local/bin"
        remote_src: true
        creates: "{{ user_home }}/.local/bin/uv"
        owner: "{{ actual_user }}"
        group: "{{ actual_user }}"
        extra_opts:
          - --strip-components=1

    - name: Remove uv tarball
      ansible.builtin.file:
        path: "/tmp/uv-{{ uv_arch }}.tar.gz"
        state: absent

- name: Display uv installation info
  ansible.builtin.debug:
    msg: |
      uv installed ({{ 'repo-managed — rides a normal system update'
                       if ansible_facts['distribution'] in ['Fedora', 'MacOSX']
                       else 'user-owned in ~/.local/bin — hyperi-update refreshes it' }}).
        uv venv / uv sync / uv run / uv pip install
      uv replaces: pip, pyenv, pipx, virtualenv
