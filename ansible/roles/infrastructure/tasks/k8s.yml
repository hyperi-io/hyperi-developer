---
# Kubernetes tools installation (kubectl, k9s, kubectx/kubens, kind, ArgoCD, dive)

# ============================================================================
# KUBECTL - Dynamic version detection
# ============================================================================

- name: Detect latest stable Kubernetes version
  ansible.builtin.uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: true
  register: k8s_stable_version
  delegate_to: localhost
  become: false
  check_mode: false

- name: Extract Kubernetes minor version
  ansible.builtin.set_fact:
    k8s_version: "{{ k8s_stable_version.content | trim | regex_replace('^v([0-9]+\\.[0-9]+).*', '\\1') }}"

- name: Display detected Kubernetes version
  ansible.builtin.debug:
    msg: "Using Kubernetes {{ k8s_version }}"

# Fedora
- name: Add Kubernetes repository (Fedora)
  ansible.builtin.yum_repository:
    name: kubernetes
    description: Kubernetes
    baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/"
    enabled: true
    gpgcheck: true
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/repodata/repomd.xml.key"
  when: ansible_facts['distribution'] == 'Fedora'

- name: Install kubectl (Fedora)
  ansible.builtin.dnf:
    name: kubectl
    state: present
  when: ansible_facts['distribution'] == 'Fedora'

# Ubuntu
- name: Add Kubernetes GPG key (Ubuntu)
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: '0644'
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Add Kubernetes repository (Ubuntu)
  ansible.builtin.deb822_repository:
    name: kubernetes
    types: deb
    uris: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/"
    suites: "/"
    signed_by: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    state: present
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Install kubectl (Ubuntu)
  ansible.builtin.apt:
    name: kubectl
    state: present
    update_cache: true
  when: ansible_facts['distribution'] == 'Ubuntu'


# ============================================================================
# kubectx + kubens - distro packages (Tier 1, OS-swept)
# ============================================================================
# Were GitHub-release binaries. Ubuntu ships kubectx in universe, Fedora in its
# repos; both bundle kubens in the SAME package, so one install covers both.
- name: Install kubectx and kubens (Linux)
  block:
    - name: Install kubectx (Fedora)
      ansible.builtin.dnf:
        name: kubectx
        state: present
      when: ansible_facts['distribution'] == 'Fedora'

    - name: Install kubectx (Ubuntu)
      ansible.builtin.apt:
        name: kubectx
        state: present
        update_cache: true
      when: ansible_facts['distribution'] == 'Ubuntu'

  rescue:
    - name: Record that kubectx/kubens did not install
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['kubectx/kubens: ' ~ (ansible_failed_result.msg | default('install failed'))] }}

  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# k9s - Fedora dnf (Tier 1); Ubuntu keeps the GitHub binary (Tier 3) below
# ============================================================================
# Fedora packages k9s natively (verified in the official repo for Fedora 43/44,
# and 43 is our supported floor). Ubuntu has no apt package or vendor repo for
# it, so on Ubuntu it stays a GitHub-release binary in the block below and
# hyperi-update re-fetches it.
- name: Install k9s (Fedora)
  block:
    - name: Install k9s (Fedora)
      ansible.builtin.dnf:
        name: k9s
        state: present

  rescue:
    - name: Record that k9s did not install (Fedora)
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['k9s: ' ~ (ansible_failed_result.msg | default('install failed'))] }}

  when: ansible_facts['distribution'] == 'Fedora'


# ============================================================================
# LINUX - GitHub-release binaries (Tier 3: hyperi-update re-fetches these)
# ============================================================================
# No apt/dnf repo, snap, or language manager ships these, so they come from
# GitHub releases and hyperi-update re-pulls the latest each run. k9s is here
# for Ubuntu only (Fedora took the dnf package above).
- name: Install Kubernetes CLI tools via binary download (Linux)
  block:
    # k9s -- Ubuntu only (Fedora uses dnf, above)
    - name: Get latest k9s version (Ubuntu)
      ansible.builtin.uri:
        url: https://api.github.com/repos/derailed/k9s/releases/latest
        return_content: true
      register: k9s_latest
      check_mode: false
      when: ansible_facts['distribution'] == 'Ubuntu'

    - name: Download and extract k9s (Ubuntu)
      ansible.builtin.unarchive:
        src: "https://github.com/derailed/k9s/releases/download/{{ k9s_latest.json.tag_name }}/k9s_Linux_{{ hyperi_arch_deb }}.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        include: k9s
        mode: '0755'
      when:
        - ansible_facts['distribution'] == 'Ubuntu'
        - not ansible_check_mode

    # kind, not minikube. kind runs vanilla kubeadm Kubernetes in docker, which
    # is closer to the real clusters our helm/argocd work targets; minikube is
    # its own opinionated distribution.
    #
    # minikube used to be installed HERE while developer/tasks/removals.yml
    # tombstoned it -- the same run removed it and put it back, and since the
    # developer role runs first, the reinstall won. The tombstone only works
    # once the install is gone too.
    - name: Get latest kind version
      ansible.builtin.uri:
        url: https://api.github.com/repos/kubernetes-sigs/kind/releases/latest
        return_content: true
      register: kind_latest
      check_mode: false

    - name: Download kind
      ansible.builtin.get_url:
        url: "https://github.com/kubernetes-sigs/kind/releases/download/{{ kind_latest.json.tag_name }}/kind-linux-{{ hyperi_arch_deb }}"
        dest: /usr/local/bin/kind
        mode: '0755'

    # ArgoCD CLI
    - name: Get latest ArgoCD version
      ansible.builtin.uri:
        url: https://api.github.com/repos/argoproj/argo-cd/releases/latest
        return_content: true
      register: argocd_latest
      check_mode: false

    - name: Download ArgoCD CLI
      ansible.builtin.get_url:
        url: "https://github.com/argoproj/argo-cd/releases/download/{{ argocd_latest.json.tag_name }}/argocd-linux-{{ hyperi_arch_deb }}"
        dest: /usr/local/bin/argocd
        mode: '0755'

    # dive
    - name: Get latest dive version
      ansible.builtin.uri:
        url: https://api.github.com/repos/wagoodman/dive/releases/latest
        return_content: true
      register: dive_latest
      check_mode: false

    # dive tags its releases v0.13.1 but names the asset dive_0.13.1_... -- the
    # leading v is stripped in the filename but not the path.
    - name: Set the dive asset version
      ansible.builtin.set_fact:
        dive_version: "{{ dive_latest.json.tag_name | regex_replace('^v', '') }}"

    - name: Download and extract dive
      ansible.builtin.unarchive:
        src: >-
          https://github.com/wagoodman/dive/releases/download/{{ dive_latest.json.tag_name }}/dive_{{ dive_version }}_linux_{{ hyperi_arch_deb }}.tar.gz
        dest: /usr/local/bin
        remote_src: true
        include: dive
        mode: '0755'
      when: not ansible_check_mode

    # kustomize -- a monorepo: /releases/latest can point at a non-CLI component
    # (api/, cmd/config/), so we take the newest `kustomize/vX` release and use
    # its own asset URL (which already carries the correctly-encoded tag path).
    - name: Get kustomize releases
      ansible.builtin.uri:
        url: https://api.github.com/repos/kubernetes-sigs/kustomize/releases
        return_content: true
      register: kustomize_releases
      check_mode: false

    - name: Select the latest kustomize CLI asset URL
      ansible.builtin.set_fact:
        kustomize_asset_url: >-
          {{ (kustomize_releases.json | selectattr('tag_name', 'match', 'kustomize/v') | list | first).assets
             | selectattr('name', 'search', '_linux_' ~ hyperi_arch_deb ~ '.tar.gz')
             | map(attribute='browser_download_url') | first }}

    - name: Download and extract kustomize
      ansible.builtin.unarchive:
        src: "{{ kustomize_asset_url }}"
        dest: /usr/local/bin
        remote_src: true
        include: kustomize
        mode: '0755'
      when: not ansible_check_mode

    # kubeconform (CI parity: hyperi-ci runs it as a blocking gate). --pinned
    # takes the CI-exact tag from group_vars; latest otherwise -- and only then
    # do we hit the GitHub API, so a pinned install does not depend on it.
    - name: Get latest kubeconform version
      ansible.builtin.uri:
        url: https://api.github.com/repos/yannh/kubeconform/releases/latest
        return_content: true
      register: kubeconform_latest
      check_mode: false
      when: not (hyperi_pinned | default(false) and 'kubeconform' in (hyperi_versions | default({})))

    - name: Resolve the kubeconform tag (pinned or latest)
      ansible.builtin.set_fact:
        kubeconform_ref: >-
          {{ hyperi_versions['kubeconform']
             if (hyperi_pinned | default(false) and 'kubeconform' in (hyperi_versions | default({})))
             else kubeconform_latest.json.tag_name }}

    - name: Download and extract kubeconform
      ansible.builtin.unarchive:
        src: "https://github.com/yannh/kubeconform/releases/download/{{ kubeconform_ref }}/kubeconform-linux-{{ hyperi_arch_deb }}.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        include: kubeconform
        mode: '0755'
      when: not ansible_check_mode

    # kube-linter (CI parity). Asset naming is uneven: amd64 has no arch suffix
    # (kube-linter-linux.tar.gz), arm64 does (kube-linter-linux_arm64.tar.gz).
    # --pinned takes the CI-exact tag from group_vars (see kubeconform above).
    - name: Get latest kube-linter version
      ansible.builtin.uri:
        url: https://api.github.com/repos/stackrox/kube-linter/releases/latest
        return_content: true
      register: kube_linter_latest
      check_mode: false
      when: not (hyperi_pinned | default(false) and 'kube-linter' in (hyperi_versions | default({})))

    - name: Resolve the kube-linter tag (pinned or latest)
      ansible.builtin.set_fact:
        kube_linter_ref: >-
          {{ hyperi_versions['kube-linter']
             if (hyperi_pinned | default(false) and 'kube-linter' in (hyperi_versions | default({})))
             else kube_linter_latest.json.tag_name }}

    - name: Download and extract kube-linter
      ansible.builtin.unarchive:
        src: >-
          https://github.com/stackrox/kube-linter/releases/download/{{ kube_linter_ref }}/kube-linter-linux{{ '_arm64' if hyperi_arch_deb == 'arm64' else '' }}.tar.gz
        dest: /usr/local/bin
        remote_src: true
        include: kube-linter
        mode: '0755'
      when: not ansible_check_mode

  rescue:
    # One dead upstream must not cost the whole k8s toolset. See
    # docs/resilient-deploy.md.
    - name: Record that a Kubernetes CLI tool did not install
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['Kubernetes CLI tools (k9s/kind/argocd/dive/kustomize/kubeconform/kube-linter): '
                ~ (ansible_failed_result.msg | default('download failed'))] }}

  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# macOS - Install via Homebrew
# ============================================================================

- name: Install Kubernetes tools via Homebrew (macOS)
  block:
    - name: Install kubectl
      community.general.homebrew:
        name: kubernetes-cli
        state: present

    - name: Install k9s
      community.general.homebrew:
        name: k9s
        state: present

    - name: Install kubectx
      community.general.homebrew:
        name: kubectx
        state: present

    - name: Install kind
      community.general.homebrew:
        name: kind
        state: present

    - name: Install ArgoCD CLI
      community.general.homebrew:
        name: argocd
        state: present

    - name: Install dive
      community.general.homebrew:
        name: dive
        state: present

    - name: Install kustomize
      community.general.homebrew:
        name: kustomize
        state: present

    - name: Install kubeconform
      community.general.homebrew:
        name: kubeconform
        state: present

    - name: Install kube-linter
      community.general.homebrew:
        name: kube-linter
        state: present

  become: false
  environment: "{{ homebrew_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'
