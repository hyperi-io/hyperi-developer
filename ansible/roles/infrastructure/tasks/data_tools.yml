---
# Data platform tools (Vector, ClickHouse, Confluent CLI)
#
# macOS notes:
# - Vector: skipped — removed from homebrew-core; would need an unofficial
#   tap. If you need Vector on Mac, install manually with the tap that
#   works for your current Vector version.
# - ClickHouse: skipped — heavyweight, not part of standard Mac dev workflow.
#   Manual install if needed: `brew install --cask clickhouse-client` or
#   run via container.
# - Confluent CLI: INSTALLED on macOS — needs the confluentinc/tap added
#   first (which is done below).
# Linux branches below are unchanged.

- name: Skipped data platform tools notice (macOS)
  ansible.builtin.debug:
    msg: |
      Vector and ClickHouse are intentionally skipped on macOS
      (no clean homebrew formula). Install manually if needed.
      Confluent CLI IS installed below via the confluentinc/tap.
  when: ansible_facts['distribution'] == 'MacOSX'

# ============================================================================
# VECTOR - Log aggregation and routing
# ============================================================================

- name: Install Vector (Fedora)
  block:
    - name: Add Vector repository
      ansible.builtin.yum_repository:
        name: vector
        description: Vector
        baseurl: https://yum.vector.dev/stable/vector-0/$basearch/
        enabled: true
        gpgcheck: true
        repo_gpgcheck: true
        gpgkey:
          - https://keys.datadoghq.com/DATADOG_RPM_KEY_CURRENT.public
          - https://keys.datadoghq.com/DATADOG_RPM_KEY_B01082D3.public
          - https://keys.datadoghq.com/DATADOG_RPM_KEY_FD4BF915.public

    - name: Install Vector
      ansible.builtin.dnf:
        name: vector
        state: present

  when: ansible_facts['distribution'] == 'Fedora'

- name: Install Vector (Ubuntu)
  block:
    - name: Download Datadog APT GPG keys for Vector
      ansible.builtin.get_url:
        url: "{{ item.url }}"
        dest: "{{ item.dest }}"
        mode: '0644'
      loop:
        - url: https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public
          dest: /tmp/vector-current.pub
        - url: https://keys.datadoghq.com/DATADOG_APT_KEY_C0962C7D.public
          dest: /tmp/vector-C0962C7D.pub
        - url: https://keys.datadoghq.com/DATADOG_APT_KEY_F14F620E.public
          dest: /tmp/vector-F14F620E.pub

    - name: Create Datadog keyring for Vector
      ansible.builtin.shell: |
        cat /tmp/vector-current.pub /tmp/vector-C0962C7D.pub /tmp/vector-F14F620E.pub | \
          gpg --dearmor --output /usr/share/keyrings/datadog-archive-keyring.gpg
        chmod 644 /usr/share/keyrings/datadog-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/datadog-archive-keyring.gpg

    - name: Add Vector APT repository
      ansible.builtin.deb822_repository:
        name: vector
        types: deb
        uris: "https://apt.vector.dev/"
        suites: stable
        components: vector-0
        signed_by: /usr/share/keyrings/datadog-archive-keyring.gpg
        state: present

    - name: Install Vector
      ansible.builtin.apt:
        name: vector
        state: present
        update_cache: true

  when: ansible_facts['distribution'] == 'Ubuntu'

# Vector intentionally not installed on macOS — see header comment.

# ============================================================================
# CLICKHOUSE - Analytics database client
# ============================================================================

- name: Install ClickHouse client (Fedora)
  block:
    - name: Add ClickHouse repository
      ansible.builtin.yum_repository:
        name: clickhouse-stable
        description: ClickHouse - Stable Repository
        baseurl: https://packages.clickhouse.com/rpm/stable/
        enabled: true
        gpgcheck: false

    - name: Install ClickHouse client
      ansible.builtin.dnf:
        name: clickhouse-client
        state: present

  when: ansible_facts['distribution'] == 'Fedora'

- name: Install ClickHouse client (Ubuntu)
  block:
    - name: Add ClickHouse GPG key
      ansible.builtin.get_url:
        url: https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key
        dest: /etc/apt/keyrings/clickhouse.asc
        mode: '0644'

    - name: Add ClickHouse APT repository
      ansible.builtin.deb822_repository:
        name: clickhouse
        types: deb
        uris: "https://packages.clickhouse.com/deb"
        suites: stable
        components: main
        signed_by: /etc/apt/keyrings/clickhouse.asc
        state: present

    - name: Install ClickHouse client
      ansible.builtin.apt:
        name: clickhouse-client
        state: present
        update_cache: true

  when: ansible_facts['distribution'] == 'Ubuntu'

# ClickHouse intentionally not installed on macOS — see header comment.

# ============================================================================
# CONFLUENT CLI - Kafka client tools
# ============================================================================

- name: Install Confluent CLI (Fedora)
  block:
    - name: Detect latest Confluent version
      ansible.builtin.uri:
        url: https://packages.confluent.io/rpm/
        return_content: true
      register: confluent_page

    - name: Extract Confluent version
      ansible.builtin.set_fact:
        confluent_version: "{{ confluent_page.content | regex_findall('[0-9]+\\.[0-9]+') | sort | last | default('8.1') }}"

    - name: Import Confluent GPG key
      ansible.builtin.rpm_key:
        key: "https://packages.confluent.io/rpm/{{ confluent_version }}/archive.key"
        state: present

    - name: Add Confluent repository
      ansible.builtin.yum_repository:
        name: Confluent
        description: Confluent repository
        baseurl: "https://packages.confluent.io/rpm/{{ confluent_version }}"
        enabled: true
        gpgcheck: true
        gpgkey: "https://packages.confluent.io/rpm/{{ confluent_version }}/archive.key"

    - name: Install Confluent CLI
      ansible.builtin.dnf:
        name: confluent-cli
        state: present

  when: ansible_facts['distribution'] == 'Fedora'

- name: Install Confluent CLI (Ubuntu)
  block:
    - name: Detect latest Confluent version
      ansible.builtin.uri:
        url: https://packages.confluent.io/deb/
        return_content: true
      register: confluent_page_ubuntu
      check_mode: false

    - name: Extract Confluent version
      ansible.builtin.set_fact:
        confluent_version_ubuntu: "{{ confluent_page_ubuntu.content | regex_findall('[0-9]+\\.[0-9]+') | sort | last | default('8.1') }}"

    - name: Add Confluent GPG key
      ansible.builtin.get_url:
        url: "https://packages.confluent.io/deb/{{ confluent_version_ubuntu }}/archive.key"
        dest: /etc/apt/keyrings/confluent.asc
        mode: '0644'

    - name: Add Confluent APT repository
      ansible.builtin.deb822_repository:
        name: confluent
        types: deb
        uris: "https://packages.confluent.io/deb/{{ confluent_version_ubuntu }}"
        suites: stable
        components: main
        signed_by: /etc/apt/keyrings/confluent.asc
        state: present

    - name: Install Confluent CLI
      ansible.builtin.apt:
        name: confluent-cli
        state: present
        update_cache: true

  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Tap Confluent formulae (macOS)
  community.general.homebrew_tap:
    name: confluentinc/tap
    state: present
  become: false
  environment: "{{ homebrew_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Install Confluent CLI via Homebrew (macOS)
  community.general.homebrew:
    name: confluentinc/tap/cli
    state: present
  become: false
  environment: "{{ homebrew_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'

