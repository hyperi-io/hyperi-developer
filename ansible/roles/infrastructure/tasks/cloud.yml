---
# Cloud tools installation (AWS CLI, Helm, OpenTofu, OpenBao)
# Note: kubectl moved to k8s.yml
#
# NO HASHICORP TOOLS. HashiCorp relicensed the lot to BUSL in 2023 and IBM
# completed its acquisition in February 2025; we use the open-source forks the
# Linux Foundation now stewards instead:
#
#   terraform -> tofu   (OpenTofu, MPL-2.0)
#   vault     -> bao    (OpenBao, MPL-2.0)
#
# `aws-vault` below is NOT HashiCorp Vault -- it is 99designs/aws-vault, an
# unrelated tool for keeping AWS credentials in the OS keychain. It stays.
#
# Packer has no viable fork (the community never produced one) and is
# deliberately NOT installed here. hyperi-infra needs it for image builds; its
# developers install it themselves rather than have us ship a BUSL binary to
# every workstation.

# ============================================================================
# OPENTOFU REPOSITORY (Ubuntu only)
# ============================================================================
# Fedora packages opentofu natively (verified: 1.11.5 in the f44 release repo,
# f43 updates), so it needs no vendor repo. Ubuntu does not package it at all
# (verified against a real 26.04 container: no candidate in main or universe),
# so we add OpenTofu's own repo -- still auto-updating, one rung down.
#
# The suite is literally "any" and the packages are arch-generic, so unlike the
# HashiCorp repo this needs no LTS-codename mapping and no arch handling.

- name: Configure OpenTofu repository (Ubuntu)
  block:
    - name: Create keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    # Two keys, both required: the project's signing key and the package
    # host's. They go in one keyring; apt accepts either signature.
    - name: Add OpenTofu project GPG key
      ansible.builtin.get_url:
        url: https://get.opentofu.org/opentofu.gpg
        dest: /etc/apt/keyrings/opentofu.gpg
        mode: '0644'

    - name: Add OpenTofu package host GPG key
      ansible.builtin.get_url:
        url: https://packages.opentofu.org/opentofu/tofu/gpgkey
        dest: /etc/apt/keyrings/opentofu-repo.asc
        mode: '0644'

    - name: Add OpenTofu repository
      ansible.builtin.deb822_repository:
        name: opentofu
        types: deb
        uris: "https://packages.opentofu.org/opentofu/tofu/any/"
        suites: any
        components: main
        signed_by: /etc/apt/keyrings/opentofu.gpg
        state: present

  when: ansible_facts['distribution'] == 'Ubuntu'

# ============================================================================
# AWS CLI V2 (Linux - official snap, classic confinement)
# ============================================================================
# Was the zip installer (`aws/install`): a static unpack with no update path --
# you must re-run it to upgrade. The official `aws-cli` snap is the highest
# OS-swept rung (snapd auto-refreshes it). classic confinement is required so
# the CLI can read ~/.aws and the rest of the host filesystem.
#
# Needs snapd present. Ubuntu ships it; on Fedora snapd is not installed by
# default, so if it is absent this warns and carries on (see
# docs/resilient-deploy.md) rather than silently falling back to an unmanaged
# static install.
- name: Install AWS CLI v2 via snap (Linux)
  block:
    - name: Install the aws-cli snap (classic)
      community.general.snap:
        name: aws-cli
        classic: true
        state: present

  rescue:
    - name: Record that AWS CLI v2 did not install
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['AWS CLI v2: ' ~ (ansible_failed_result.msg | default('snap install failed (snapd present?)'))] }}

  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# AWS SESSION MANAGER PLUGIN (for aws ssm start-session)
# ============================================================================

- name: Install AWS Session Manager Plugin (Linux)
  block:
    - name: Install Session Manager Plugin (Fedora)
      ansible.builtin.dnf:
        name: https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin.rpm
        state: present
        disable_gpg_check: true
      when: ansible_facts['distribution'] == 'Fedora'

    - name: Install Session Manager Plugin (Ubuntu)
      ansible.builtin.apt:
        deb: https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb
      when: ansible_facts['distribution'] == 'Ubuntu'

  rescue:
    - name: Record that the Session Manager Plugin did not install
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['Session Manager Plugin: ' ~ (ansible_failed_result.msg | default('download failed'))] }}

  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# AWS-VAULT (secure credential storage in OS keychain)
# ============================================================================

- name: Install aws-vault (Linux)
  block:
    - name: Get latest aws-vault version from GitHub API
      ansible.builtin.uri:
        url: https://api.github.com/repos/99designs/aws-vault/releases/latest
        return_content: true
      register: aws_vault_release
      check_mode: false

    - name: Set aws-vault version fact
      ansible.builtin.set_fact:
        aws_vault_version: "{{ aws_vault_release.json.tag_name }}"

    - name: Download aws-vault binary
      ansible.builtin.get_url:
        url: "https://github.com/99designs/aws-vault/releases/download/{{ aws_vault_version }}/aws-vault-linux-{{ hyperi_arch_deb }}"
        dest: /usr/local/bin/aws-vault
        mode: '0755'

  rescue:
    - name: Record that aws-vault did not install
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['aws-vault: ' ~ (ansible_failed_result.msg | default('download failed'))] }}

  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# HELM (Linux - official baltocdn vendor repo)
# ============================================================================
# Was a GitHub-release binary (no update path). baltocdn is Helm's own package
# host: an apt repo on Ubuntu and a yum/dnf repo on Fedora, both OS-swept so the
# host updater keeps Helm current. Same armored signing key for both.
- name: Install Helm via the baltocdn repository (Linux)
  block:
    - name: Add the Helm signing key (Ubuntu)
      ansible.builtin.get_url:
        url: https://baltocdn.com/helm/signing.asc
        dest: /etc/apt/keyrings/helm.asc
        mode: '0644'
      when: ansible_facts['distribution'] == 'Ubuntu'

    - name: Add the Helm APT repository (Ubuntu)
      ansible.builtin.deb822_repository:
        name: helm
        types: deb
        uris: "https://baltocdn.com/helm/stable/debian/"
        suites: all
        components: main
        signed_by: /etc/apt/keyrings/helm.asc
        state: present
      when: ansible_facts['distribution'] == 'Ubuntu'

    - name: Install Helm (Ubuntu)
      ansible.builtin.apt:
        name: helm
        state: present
        update_cache: true
      when: ansible_facts['distribution'] == 'Ubuntu'

    - name: Add the Helm YUM repository (Fedora)
      ansible.builtin.yum_repository:
        name: helm
        description: Helm
        baseurl: https://baltocdn.com/helm/stable/rpm
        enabled: true
        gpgcheck: true
        gpgkey: https://baltocdn.com/helm/signing.asc
      when: ansible_facts['distribution'] == 'Fedora'

    - name: Install Helm (Fedora)
      ansible.builtin.dnf:
        name: helm
        state: present
      when: ansible_facts['distribution'] == 'Fedora'

    - name: Install Helm Dashboard plugin
      ansible.builtin.command: helm plugin install https://github.com/komodorio/helm-dashboard.git
      become: false
      failed_when: false
      changed_when: false

  rescue:
    - name: Record that Helm did not install
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['Helm: ' ~ (ansible_failed_result.msg | default('repo/install failed'))] }}

  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# OPENTOFU + OPENBAO
# ============================================================================
# Packaging differs per platform, so each takes the best rung available:
#
#            tofu                      bao
#   Fedora   dnf (native)              dnf (native)
#   Ubuntu   OpenTofu repo (above)     openbao snap (see below)
#   macOS    brew core                 brew core
#
# Verified 2026-07-17 against real containers, not from documentation:
#   Fedora 44 stable has opentofu 1.11.5 AND openbao 2.5.5. (Fedora's mdapi
#   reports openbao only in updates-testing because it returns the NEWEST
#   build; a real `dnf --disablerepo=updates-testing list` shows 2.5.1 in
#   release and 2.5.5 in updates. Trust dnf, not the API.)
#   Ubuntu 26.04 has NEITHER in main or universe.

- name: Install OpenTofu (Ubuntu)
  ansible.builtin.apt:
    name: tofu
    state: present
    update_cache: true
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: Install OpenTofu and OpenBao (Fedora)
  ansible.builtin.dnf:
    name:
      - opentofu
      - openbao
    state: present
  when: ansible_facts['distribution'] == 'Fedora'

# OpenBao publishes no APT repo. It was a hand-pinned GitHub release .deb -- the
# bottom rung of the packaging ladder (nothing auto-updates it), which is why
# hosts out there carry a hand-installed openbao with no update path. The
# publisher-verified `openbao` snap is the OS-swept replacement: snapd
# auto-refreshes it. classic confinement is required. Fedora keeps its native
# dnf package (a higher rung, above); macOS uses brew.
#
# (openbao_version / openbao_deb_arch in defaults/main.yml are now unused on
# Ubuntu -- kept for the opt-in --pinned path, which is out of scope here.)
- name: Install OpenBao via snap (Ubuntu)
  block:
    - name: Install the openbao snap (classic)
      community.general.snap:
        name: openbao
        classic: true
        state: present

  rescue:
    - name: Record that OpenBao did not install
      ansible.builtin.set_fact:
        deploy_warnings: >-
          {{ deploy_warnings | default([])
             + ['OpenBao: ' ~ (ansible_failed_result.msg | default('snap install failed'))] }}

  when: ansible_facts['distribution'] == 'Ubuntu'

# ============================================================================
# macOS - Install via Homebrew
# ============================================================================

- name: Install cloud tools via Homebrew (macOS)
  block:
    - name: Install AWS CLI
      community.general.homebrew:
        name: awscli
        state: present

    - name: Install Helm
      community.general.homebrew:
        name: helm
        state: present

    # Both are in homebrew-core, so no tap is needed. That is a straight
    # improvement on what they replace: HashiCorp pulled terraform and vault
    # OUT of homebrew-core into their own tap after the licence change, which
    # is the tap we no longer add.
    - name: Install OpenTofu
      community.general.homebrew:
        name: opentofu
        state: present

    - name: Install OpenBao
      community.general.homebrew:
        name: openbao
        state: present

    - name: Install Helm Dashboard plugin
      ansible.builtin.command: helm plugin install https://github.com/komodorio/helm-dashboard.git
      failed_when: false
      changed_when: false

    - name: Install Session Manager Plugin
      community.general.homebrew_cask:
        name: session-manager-plugin
        state: present

    - name: Install aws-vault
      community.general.homebrew_cask:
        name: aws-vault
        state: present

  become: false
  environment: "{{ homebrew_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'

# ============================================================================
# CHECKOV - IaC / config security scanner (CI parity)
# ============================================================================
# checkov scans OpenTofu/Terraform, Kubernetes, CloudFormation and more, so it
# lives with the IaC tools. It is a Python tool that no distro packages, so
# Linux uses uv (Tier 2 -- hyperi-update refreshes it via `uv tool upgrade
# --all`). macOS has a brew formula. uv is installed by the base.
- name: Install checkov (macOS)
  community.general.homebrew:
    name: checkov
    state: present
  become: false
  environment: "{{ homebrew_env }}"
  when: ansible_facts['distribution'] == 'MacOSX'

- name: Install checkov (Linux)
  ansible.builtin.command:
    cmd: uv tool install checkov
    creates: "{{ user_home }}/.local/share/uv/tools/checkov"
  become: true
  become_user: "{{ actual_user }}"
  environment:
    PATH: "/usr/local/bin:{{ user_home }}/.local/bin:{{ ansible_facts['env'].PATH }}"
  register: infrastructure_checkov
  changed_when: "'Installed' in infrastructure_checkov.stdout | default('')"
  failed_when: false
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

- name: Warn if checkov did not install
  # noqa: var-naming[no-role-prefix] -- deploy_warnings is the shared accumulator
  # that playbooks/main.yml post_tasks reports from; a per-role name would
  # fragment the summary so almost nothing would be reported.
  ansible.builtin.set_fact:
    deploy_warnings: >-
      {{ deploy_warnings | default([])
         + ['checkov: uv tool install failed -- ' ~ (infrastructure_checkov.stderr | default('') | trim | truncate(120))] }}
  when:
    - ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
    - infrastructure_checkov.rc | default(0) != 0
