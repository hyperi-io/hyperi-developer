---
# Shell configuration (PATH, bash history auto-commit, etc.)

# ============================================================================
# PATH CONFIGURATION (SYSTEM-WIDE)
# Add common tool directories to PATH for all users
# ============================================================================

- name: Configure PATH additions system-wide (Linux)
  ansible.builtin.copy:
    dest: /etc/profile.d/dev-path.sh
    content: |
      # Developer Environment PATH additions
      # System-wide configuration for all users

      # Add ~/.cargo/bin for UV, Rust tools
      if [ -d "$HOME/.cargo/bin" ]; then
          export PATH="$HOME/.cargo/bin:$PATH"
      fi

      # Add ~/.local/bin for user-installed tools (pipx, gext, etc.)
      if [ -d "$HOME/.local/bin" ]; then
          export PATH="$HOME/.local/bin:$PATH"
      fi

      # Add ~/.npm-global/bin for npm global tools (semantic-release, etc.)
      if [ -d "$HOME/.npm-global/bin" ]; then
          export PATH="$HOME/.npm-global/bin:$PATH"
      fi
    mode: '0644'
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# ============================================================================
# BASH HISTORY AUTO-COMMIT (SYSTEM-WIDE)
# Commands are written to history immediately (not just on shell exit)
# ============================================================================

- name: Configure bash history auto-commit system-wide (Linux)
  ansible.builtin.copy:
    dest: /etc/profile.d/bash-history-autocommit.sh
    content: |
      # Bash history auto-commit: Commands saved immediately
      # System-wide configuration for all users

      if [ -n "$BASH_VERSION" ]; then
          shopt -s histappend                      # Append to history file, don't overwrite
          PROMPT_COMMAND="history -a${PROMPT_COMMAND:+; $PROMPT_COMMAND}"  # Write to history after each command
          export HISTSIZE=10000                    # Commands in memory
          export HISTFILESIZE=20000                # Commands in file
          export HISTCONTROL=ignoredups:erasedups  # No duplicate entries
          export HISTTIMEFORMAT="%F %T "           # Timestamp format
      fi
    mode: '0644'
  when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']

# macOS: scope zsh history settings to the USER's ~/.zshrc, not /etc/zshenv.
# The original `/etc/zshenv` write affected every zsh session for every user
# on the box and required root. ~/.zshrc is user-level, no sudo needed, and
# uses a marked block so re-runs are idempotent and the change is easy to
# spot or remove.
- name: Configure zsh history settings (macOS — user-level ~/.zshrc)
  ansible.builtin.blockinfile:
    path: "{{ user_home }}/.zshrc"
    create: true
    mode: '0644'
    marker: "# {mark} HYPERI: zsh history settings"
    block: |
      setopt APPEND_HISTORY        # Append to history file (don't overwrite)
      setopt INC_APPEND_HISTORY    # Write history immediately, not at shell exit
      setopt HIST_IGNORE_DUPS      # Skip immediate duplicates
      setopt HIST_FIND_NO_DUPS     # Don't show duplicates in search
      export HISTSIZE=10000        # Commands in memory
      export SAVEHIST=20000        # Commands in history file
      export HISTFILE="$HOME/.zsh_history"
  become: false
  when: ansible_facts['distribution'] == 'MacOSX'

