---
# Delegated scenario -- runs against a REAL, already-existing host.
#
# Set MOLECULE_TARGET_HOST and MOLECULE_TARGET_USER (see inventory.yml). This
# repo is public, so no host is named here.
#
# SAFETY: `create` and `destroy` are deliberately ABSENT from test_sequence.
# The default molecule sequence ends in `destroy`, which against someone's real
# workstation would be catastrophic. There is nothing to create (the host
# exists) and nothing may be destroyed. `molecule test -s existing-host` is
# therefore intentionally NOT a full create/destroy cycle.
#
# SNAPSHOT THE HOST BEFORE RUNNING. `converge` genuinely changes it -- that is
# the entire point of the scenario.
#
# Preview first, always (the Puppet `noop` habit -- tombstones are the
# destructive part of this playbook):
#     molecule converge -s existing-host -- --check --diff

dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
    ignore-errors: true

ansible:
  cfg:
    defaults:
      host_key_checking: false
      interpreter_python: auto_silent
    ssh_connection:
      pipelining: true
  env:
    ANSIBLE_FORCE_COLOR: "1"
  executor:
    backend: ansible-playbook
    args:
      ansible_playbook:
        - --diff
  playbooks:
    converge: converge.yml
    verify: verify.yml

scenario:
  name: existing-host
  # No create / destroy / cleanup: this is a real machine.
  test_sequence:
    - dependency
    - syntax
    - converge
    - idempotence
    - verify
