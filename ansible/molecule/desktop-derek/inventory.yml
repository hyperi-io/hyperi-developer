---
# The real VM. Not created or destroyed by molecule — it already exists.
#
# Override the connection details without editing this file:
#   MOLECULE_DEREK_HOST=desktop-derek.devex.hyperi.io
#   MOLECULE_DEREK_USER=derek

all:
  hosts:
    desktop-derek:
      ansible_host: "{{ lookup('env', 'MOLECULE_DEREK_HOST') | default('desktop-derek.devex.hyperi.io', true) }}"
      ansible_user: "{{ lookup('env', 'MOLECULE_DEREK_USER') | default('derek', true) }}"
      ansible_python_interpreter: auto_silent
