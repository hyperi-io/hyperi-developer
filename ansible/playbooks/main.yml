---
# Developer Environment - Main Playbook
# Installs and configures complete development environment
#
# Usage:
#   ansible-playbook playbooks/main.yml
#   ansible-playbook playbooks/main.yml --check         # Dry-run
#   ansible-playbook playbooks/main.yml --tags docker   # Specific tags

- name: Developer Environment Setup
  hosts: all
  become: false
  gather_facts: true

  pre_tasks:
    - name: Display system information
      ansible.builtin.debug:
        msg: |
          OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
          Architecture: {{ ansible_facts['architecture'] }}
          Python: {{ ansible_facts['python_version'] }}
      tags: ['always']

    # ========================================================================
    # ARCHITECTURE
    # ========================================================================
    # Upstreams cannot agree what to call an architecture, so we carry both
    # spellings and each download picks the one its upstream uses:
    #
    #   hyperi_arch_deb   amd64  / arm64      Debian-style. Most GitHub releases.
    #   hyperi_arch_gnu   x86_64 / aarch64    GNU triple style. AWS CLI, rustc.
    #
    # Defined ONCE, here, rather than per role: three roles had grown their own
    # near-identical copy of this jinja, and a fourth was about to. `always`
    # means it is set for any --tags run.
    #
    # arm64 Linux is real here -- arm64 VMs, containers on Apple Silicon -- so a
    # hardcoded amd64 URL is a 404 on a real machine, not a hypothetical one.
    # Every tool we fetch by URL was checked: all of them publish arm64.
    - name: Determine architecture tokens
      ansible.builtin.set_fact:
        hyperi_arch_deb: "{{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'amd64' }}"
        hyperi_arch_gnu: "{{ 'aarch64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x86_64' }}"
      tags: ['always']

    - name: Fail on an architecture we do not publish for
      ansible.builtin.fail:
        msg: >-
          Unsupported architecture: {{ ansible_facts['architecture'] }}.
          This playbook fetches x86_64/amd64 and aarch64/arm64 builds only.
      when: ansible_facts['architecture'] not in ['x86_64', 'amd64', 'aarch64', 'arm64']
      tags: ['always']

    # Wait for package manager locks (handles automatic updates in progress)
    - name: Wait for APT lock to be released (Ubuntu)
      ansible.builtin.shell: |
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
          echo "Waiting for APT lock..."
          sleep 5
        done
        echo "APT lock released"
      args:
        executable: /bin/bash
      register: apt_lock_wait
      changed_when: false
      when: ansible_facts['distribution'] == 'Ubuntu'
      retries: 30
      delay: 10
      until: apt_lock_wait.rc == 0
      tags: ['always']

    - name: Wait for DNF lock to be released (Fedora)
      ansible.builtin.shell: |
        while pgrep -x dnf >/dev/null 2>&1 || [ -f /var/run/dnf.pid ]; do
          echo "Waiting for DNF lock..."
          sleep 5
        done
        echo "DNF lock released"
      args:
        executable: /bin/bash
      register: dnf_lock_wait
      changed_when: false
      when: ansible_facts['distribution'] == 'Fedora'
      retries: 30
      delay: 10
      until: dnf_lock_wait.rc == 0
      tags: ['always']

    # Stop automatic updates during playbook to prevent lock conflicts
    - name: Stop unattended-upgrades service (Ubuntu)
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
      when: ansible_facts['distribution'] == 'Ubuntu'
      become: true
      failed_when: false
      tags: ['always']

    - name: Stop apt-daily services (Ubuntu)
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - apt-daily.service
        - apt-daily-upgrade.service
        - apt-daily.timer
        - apt-daily-upgrade.timer
      when: ansible_facts['distribution'] == 'Ubuntu'
      become: true
      failed_when: false
      tags: ['always']

    - name: Stop dnf-automatic timer (Fedora)
      ansible.builtin.systemd:
        name: dnf-automatic.timer
        state: stopped
      when: ansible_facts['distribution'] == 'Fedora'
      become: true
      failed_when: false
      tags: ['always']

    # We support n and n-1, so the declared minimum IS n-1: Fedora 43, Ubuntu
    # 24.04 LTS. Fedora 42 went EOL 2026-05-27 and this gate still let it in.
    #
    # NOTE this duplicates the gate in roles/developer/tasks/init.yml, which
    # reads min_fedora_version / min_ubuntu_version from that role's defaults.
    # Two gates that can disagree is how the EOL version survived here after
    # the role was fixed. Giving the gate one SSoT is S1.T0c; until then, bump
    # BOTH, together, along with ansible/molecule/vars.yml.
    - name: Validate supported operating system
      ansible.builtin.fail:
        msg: >-
          Unsupported OS: {{ ansible_facts['distribution'] }}
          {{ ansible_facts['distribution_version'] }}.
          Supported: Fedora 43+, Ubuntu 24.04+, macOS.
      when: >
        (ansible_facts['distribution'] not in ['Fedora', 'Ubuntu', 'MacOSX']) or
        (ansible_facts['distribution'] == 'Fedora' and ansible_facts['distribution_major_version']|int < 43) or
        (ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] is version('24.04', '<'))
      tags: ['always']

    - name: Detect actual user (for sudo operations)
      ansible.builtin.set_fact:
        actual_user: "{{ ansible_facts['env'].SUDO_USER | default(ansible_facts['user_id'], true) }}"
      tags: ['always']

    - name: Set actual user home directory (Linux)
      ansible.builtin.set_fact:
        user_home: "{{ '/home/' + actual_user if actual_user != 'root' else '/root' }}"
      when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
      tags: ['always']

    - name: Set actual user home directory (macOS)
      ansible.builtin.set_fact:
        user_home: "{{ '/Users/' + actual_user }}"
      when: ansible_facts['distribution'] == 'MacOSX'
      tags: ['always']

    - name: Display user information
      ansible.builtin.debug:
        msg: "Installing for user: {{ actual_user }} (home: {{ user_home }})"
      tags: ['always']

    - name: Detect if GNOME is running (Linux only)
      ansible.builtin.command: pgrep -x gnome-shell
      register: gnome_running_check
      failed_when: false
      changed_when: false
      when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
      tags: ['always']

    - name: Set GNOME availability fact (Linux)
      ansible.builtin.set_fact:
        has_gnome: "{{ gnome_running_check.rc == 0 }}"
      when: ansible_facts['distribution'] in ['Fedora', 'Ubuntu']
      tags: ['always']

    - name: Set GNOME availability fact (macOS - N/A)
      ansible.builtin.set_fact:
        has_gnome: false
      when: ansible_facts['distribution'] == 'MacOSX'
      tags: ['always']

    - name: Display GNOME status
      ansible.builtin.debug:
        msg: "GNOME desktop: {{ 'Detected' if has_gnome else 'Not detected' }}"
      tags: ['always']

  roles:
    # Generic dev base — runs by default (`./install.sh` with no flags).
    - role: developer
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['developer']

    # GUI editors + DB GUI + terminal (opt-in).
    - role: developer-gui
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['developer-gui', 'never']

    # Language toolchains (each opt-in via its own tag).
    - role: developer-rust
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['developer-rust', 'never']

    - role: developer-python
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['developer-python', 'never']

    - role: developer-go
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['developer-go', 'never']

    - role: developer-c
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['developer-c', 'never']

    - role: developer-node
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['developer-node', 'never']

    # TypeScript pulls in developer-node via meta/main.yml dependency.
    - role: developer-typescript
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['developer-typescript', 'never']

    # Generic IaC + cloud CLIs (opt-in).
    - role: infrastructure
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['infrastructure', 'never']

    # ========================================================================
    # PERSONAS (meta-roles) — opinionated bundles that resolve to the roles
    # above via meta/dependencies. They pull the CLEAN developer base: its
    # destructive/org extras (removals, admin-scripts, chrome, ...) gate on
    # ansible_run_tags, so a persona's propagated tag never drags them in.
    # install.sh maps --languages/--full-stack/--infra onto these tags.
    # ========================================================================
    - role: developer-languages
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['developer-languages', 'never']

    - role: full-stack
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['full-stack', 'never']

    - role: infra
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['infra', 'never']

    # ========================================================================
    # THE THREE AUDIENCES
    # ========================================================================
    # soe (Standard Operating Environment) is a superset of contributor, which
    # is a superset of the raw tags anyone can cherry-pick:
    #
    #   1. HyperI staff              --tags soe        everything below, plus
    #                                                  org policy: VPN, telemetry
    #                                                  off, branding, bash history
    #   2. Outside contributors      --tags contributor  what you need to work ON
    #      to HyperI products                            our products: the CI
    #                                                    toolchain, no org policy
    #   3. Anyone else               --tags <whatever>   pick components directly
    #
    # The chain is wired with meta dependencies, so `--tags soe` pulls
    # contributor, which pulls developer. Nobody has to remember the list.
    #
    # This used to be called `core`, which was backwards: it meant the MAXIMAL
    # org bundle while reading like the minimal base.
    - role: contributor
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['contributor', 'never']

    - role: soe
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['soe', 'never']

    - role: soe-gui
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['soe-gui', 'never']

    # macOS modern bash (opt-in, macOS-only).
    - role: bash-modern
      tags: ['bash-modern', 'never']
      when: ansible_facts['distribution'] == 'MacOSX'

    # Targeted deployment roles (opt-in).
    - role: vm_optimizer
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['vm', 'optimizer', 'never']

    - role: rdp-server
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['rdp-server', 'never']

    # System cleanup — always runs at the end.
    - role: system_cleanup
      become: "{{ ansible_facts['distribution'] != 'MacOSX' }}"
      tags: ['always']

  post_tasks:
    # ========================================================================
    # WHAT DID NOT INSTALL
    # ========================================================================
    # This deployment is best-effort, not all-or-nothing: it is not routinely
    # maintained, and upstreams rename assets, move repos and go away. A single
    # dead upstream must not abort the run.
    #
    # The other half of that bargain is THIS. "Carry on and warn" is only
    # acceptable if the warning is unmissable -- otherwise it is just a silent
    # half-install, which is worse than failing, because the box looks done.
    #
    # Optional installs record their failure by appending to deploy_warnings
    # (see the block/rescue pattern in roles/*/tasks/*.yml). CRITICAL things --
    # unsupported OS, a broken package manager, git, the docker engine -- still
    # fail the run: a box without those is not a developer box.
    - name: Report what did not install
      ansible.builtin.debug:
        msg: |
          {{ deploy_warnings | length }} thing(s) did not install.

          The rest of the environment is set up and usable. These are optional
          components whose upstream failed; the run continued deliberately.

          {% for w in deploy_warnings %}
            - {{ w }}
          {% endfor %}

          Re-run to retry them. If one keeps failing, its upstream has probably
          moved -- that is a bug in this repo, please report it.
      when:
        - deploy_warnings is defined
        - deploy_warnings | length > 0
      tags: ['always']

    - name: Display completion message
      ansible.builtin.debug:
        msg: |
          Developer Environment installation complete{{
            ' -- with ' ~ deploy_warnings | length ~ ' warning(s), see above'
            if (deploy_warnings | default([]) | length > 0) else '!'
          }}

          Next steps:
          1. Log out and back in for Docker group membership
          2. Reboot to apply all optimizations
          3. Configure your tools (Git, AWS CLI, etc.)
      tags: ['always']
